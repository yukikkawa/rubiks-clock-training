<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7-Simul 練習アプリ - スクランブル実装(5-8手目)</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f1f3f5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        #app {
            background: white;
            padding: 20px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06);
            text-align: center;
            width: 100%;
            max-width: 440px;
        }

        h2 {
            margin: 0 0 5px 0;
            color: #212529;
            font-size: 20px;
        }

        .description {
            font-size: 12px;
            color: #868e96;
            margin-bottom: 15px;
        }

        /* スクランブル表示エリア */
        .scramble-container {
            background: #f8f9fa;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.8;
            text-align: left;
            word-break: break-all;
        }

        /* 各回転記号の進捗スタイル定義 */
        .move-item {
            display: inline-block;
            margin-right: 6px;
        }

        .move-item.pending {
            color: #adb5bd;
            font-weight: normal;
        }

        .move-item.done {
            color: #343a40;
            font-weight: normal;
        }

        .move-item.current {
            color: #000000;
            font-weight: bold;
            text-decoration: underline;
        }

        /* コントロールボタンのコンテナ */
        .scramble-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 15px;
        }

        .btn-ctrl {
            flex: 1;
            max-width: 65px;
            padding: 8px 0;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #ced4da;
            background-color: #fff;
            color: #495057;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-ctrl:active {
            background-color: #e2e6ea;
            border-color: #868e96;
        }

        .mode-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-mode {
            flex: 1;
            max-width: 120px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ced4da;
            background-color: #fff;
            color: #495057;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-mode.active {
            background-color: #e2e6ea;
            border-color: #495057;
            color: #212529;
        }

        .clock-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .clock-board {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 4px solid #495057;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            align-items: center;
            justify-items: center;
        }

        #board-front {
            background: #74c0fc;
            border-color: #1971c2;
        }

        #board-back {
            background: #91a7ff;
            border-color: #3b5bdb;
        }

        .board-title {
            font-weight: bold;
            font-size: 14px;
            color: #495057;
            margin-bottom: 4px;
        }

        .sub-clock {
            background: #e1f5fe;
            border-radius: 50%;
            border: 2px solid #0288d1;
            width: 66px;
            height: 66px;
        }

        .sub-clock.clickable {
            cursor: pointer;
        }

        #board-back .sub-clock {
            background: #e8eaf6;
            border-color: #3f51b5;
        }

        /* ピンボタン */
        .pin-btn {
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%);
            user-select: none;
            -webkit-user-select: none;
        }

        .pin-btn.up {
            background: #ffa94d;
            outline: 2px solid #f08c00;
        }

        .pin-btn.down {
            background: #868e96;
            outline: 2px solid #495057;
        }

        .btn-scramble {
            background-color: #228be6;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            box-shadow: 0 4px 12px rgba(34, 139, 230, 0.25);
        }

        .btn-scramble:active {
            background-color: #1c7ed6;
        }
    </style>
</head>

<body>

    <div id="app">
        <h2>7-Simul 盤面シミュレータ</h2>
        <div id="scramble-text" class="scramble-container">
            ここにスクランブルが表示されます
        </div>

        <div class="scramble-controls">
            <button class="btn-ctrl" onclick="moveFirst()">|◀</button>
            <button class="btn-ctrl" onclick="movePrev()">◀</button>
            <button class="btn-ctrl" onclick="moveNext()">▶</button>
            <button class="btn-ctrl" onclick="moveLast()">▶|</button>
        </div>

        <button class="btn-scramble" onclick="generateScrambleText()">スクランブル生成</button>

        <div class="clock-wrapper">
            <div>
                <div class="board-title">表 (Front)</div>
                <div id="board-front" class="clock-board"></div>
            </div>

            <div>
                <div class="board-title">裏 (Back)</div>
                <div id="board-back" class="clock-board"></div>
            </div>
        </div>

        <div class="mode-container">
            <button id="mode-y2" class="btn-mode active" onclick="setFlipMode('y2')">y2<br> (左右反転)</button>
            <button id="mode-x2" class="btn-mode" onclick="setFlipMode('x2')">x2<br> (上下反転)</button>
        </div>
    </div>

    <script>
        const state = {
            clocks: {},
            flipMode: 'y2',
            pins: { UL: false, UR: false, DL: false, DR: false },
            scrambleMoves: [],
            currentMoveIndex: -1
        };

        function initDataState() {
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    state.clocks[`F${x}${y}`] = 0;
                    state.clocks[`B${x}${y}`] = 0;
                }
            }
        }

        const FRONT_PINS = [
            { name: 'UL', left: '36%', top: '36%' },
            { name: 'UR', left: '64%', top: '36%' },
            { name: 'DL', left: '36%', top: '64%' },
            { name: 'DR', left: '64%', top: '64%' },
        ];
        const BACK_PINS_Y2 = [
            { name: 'UR', left: '36%', top: '36%' },
            { name: 'UL', left: '64%', top: '36%' },
            { name: 'DR', left: '36%', top: '64%' },
            { name: 'DL', left: '64%', top: '64%' },
        ];
        const BACK_PINS_X2 = [
            { name: 'DL', left: '36%', top: '36%' },
            { name: 'DR', left: '64%', top: '36%' },
            { name: 'UL', left: '36%', top: '64%' },
            { name: 'UR', left: '64%', top: '64%' },
        ];

        function createClockSVG(id, isFront) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("class", "sub-clock");
            svg.setAttribute("id", `container-${id}`);
            svg.setAttribute("viewBox", "0 0 100 100");

            const cx = id[1], cy = id[2];
            const isCorner = (cx === '0' || cx === '2') && (cy === '0' || cy === '2');
            if (isCorner) {
                svg.classList.add('clickable');
                svg.onclick = () => handleManualRotate(id);
            }

            const borderStroke = isFront ? "#0288d1" : "#3f51b5";

            svg.innerHTML = `
            <circle cx="50" cy="50" r="45" fill="none" stroke="${borderStroke}" stroke-width="2"/>
            <circle id="dot-${id}" cx="50" cy="12" r="3" fill="#f03e3e"/>
            <g id="ticks-${id}"></g>
            <line id="hand-${id}" x1="50" y1="50" x2="50" y2="15" stroke="#212529" stroke-width="5" stroke-linecap="round"/>
        `;
            return svg;
        }

        function renderTicks(id, isFlipped) {
            const g = document.getElementById(`ticks-${id}`);
            if (!g) return;
            g.innerHTML = '';
            const dotColor = "#495057";
            const baseAngles = [30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];

            baseAngles.forEach(angle => {
                const finalAngle = isFlipped ? (angle + 180) % 360 : angle;
                const rad = (finalAngle - 90) * Math.PI / 180;
                const cx = 50 + 38 * Math.cos(rad);
                const cy = 50 + 38 * Math.sin(rad);
                g.innerHTML += `<circle cx="${cx}" cy="${cy}" r="2" fill="${dotColor}"/>`;
            });
        }

        function initBoards() {
            initDataState();
            buildDOMBoards();
            generateScrambleText();
        }

        function buildDOMBoards() {
            const frontBoard = document.getElementById('board-front');
            const backBoard = document.getElementById('board-back');
            frontBoard.innerHTML = '';
            backBoard.innerHTML = '';

            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 3; x++) {
                    frontBoard.appendChild(createClockSVG(`F${x}${y}`, true));
                }
            }
            FRONT_PINS.forEach(({ name, left, top }) => {
                const pin = document.createElement('div');
                const isUp = state.pins[name];
                pin.className = `pin-btn ${isUp ? 'up' : 'down'}`;
                pin.id = `pin-front-${name}`;
                pin.style.left = left;
                pin.style.top = top;
                pin.onclick = () => togglePin(name);
                frontBoard.appendChild(pin);
            });

            const backPinLayout = state.flipMode === 'x2' ? BACK_PINS_X2 : BACK_PINS_Y2;
            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 3; x++) {
                    let targetX = x;
                    let targetY = y;
                    if (state.flipMode === 'x2') {
                        targetX = 2 - x;
                        targetY = 2 - y;
                    }
                    backBoard.appendChild(createClockSVG(`B${targetX}${targetY}`, false));
                }
            }
            backPinLayout.forEach(({ name, left, top }) => {
                const pin = document.createElement('div');
                const isUpOnBack = !state.pins[name];
                pin.className = `pin-btn ${isUpOnBack ? 'up' : 'down'}`;
                pin.id = `pin-back-${name}`;
                pin.style.left = left;
                pin.style.top = top;
                pin.onclick = () => togglePin(name);
                backBoard.appendChild(pin);
            });
        }

        function updateClockDisplay(id, hour, isBackAndX2) {
            const hand = document.getElementById(`hand-${id}`);
            const dot = document.getElementById(`dot-${id}`);
            if (!hand || !dot) return;

            let displayHour = hour;
            if (isBackAndX2) {
                displayHour = (hour + 6) % 12;
                dot.setAttribute('cy', '88');
            } else {
                dot.setAttribute('cy', '12');
            }

            const angleRad = ((displayHour * 30) - 90) * Math.PI / 180;
            const radius = 35;
            hand.setAttribute('x2', 50 + radius * Math.cos(angleRad));
            hand.setAttribute('y2', 50 + radius * Math.sin(angleRad));

            renderTicks(id, isBackAndX2);
        }

        function renderAllDisplays() {
            const isX2 = state.flipMode === 'x2';
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    updateClockDisplay(`F${x}${y}`, state.clocks[`F${x}${y}`], false);
                    updateClockDisplay(`B${x}${y}`, state.clocks[`B${x}${y}`], isX2);
                }
            }
            renderPins();
        }

        function togglePin(pinName) {
            state.pins[pinName] = !state.pins[pinName];
            renderPins();
        }

        function renderPins() {
            FRONT_PINS.forEach(({ name }) => {
                const el = document.getElementById('pin-front-' + name);
                if (!el) return;
                const isUp = state.pins[name];
                el.className = `pin-btn ${isUp ? 'up' : 'down'}`;
            });
            const backPinLayout = state.flipMode === 'x2' ? BACK_PINS_X2 : BACK_PINS_Y2;
            backPinLayout.forEach(({ name }) => {
                const el = document.getElementById('pin-back-' + name);
                if (!el) return;
                const isUpOnBack = !state.pins[name];
                el.className = `pin-btn ${isUpOnBack ? 'up' : 'down'}`;
            });
        }

        function setFlipMode(mode) {
            if (state.flipMode === mode) return;
            state.flipMode = mode;
            buildDOMBoards();
            renderAllDisplays();
        }

        function handleManualRotate(id) {
            rotateEngine(id, 1);
        }
        function rotateEngine(id, amount) {
            const pinOfAxis = {
                'F00': 'UL', 'B20': 'UL',
                'F20': 'UR', 'B00': 'UR',
                'F02': 'DL', 'B22': 'DL',
                'F22': 'DR', 'B02': 'DR'
            };

            const F_links = {
                'UL': ['F00', 'F10', 'F01', 'F11'],
                'UR': ['F20', 'F10', 'F21', 'F11'],
                'DL': ['F02', 'F12', 'F01', 'F11'],
                'DR': ['F22', 'F12', 'F21', 'F11']
            };
            const B_links = {
                'UL': ['B20', 'B10', 'B21', 'B11'],
                'UR': ['B00', 'B10', 'B01', 'B11'],
                'DL': ['B22', 'B12', 'B21', 'B11'],
                'DR': ['B02', 'B12', 'B01', 'B11']
            };

            const oppositeCorner = {
                'F00': 'B20', 'F20': 'B00', 'F02': 'B22', 'F22': 'B02',
                'B20': 'F00', 'B00': 'F20', 'B22': 'F02', 'B02': 'F22'
            };

            // 各時計の回転量を保持するオブジェクト（初期値はすべて0）
            let deltas = {};
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    deltas[`F${x}${y}`] = 0;
                    deltas[`B${x}${y}`] = 0;
                }
            }

            const targetPin = pinOfAxis[id];
            const isBaseFront = state.pins[targetPin] === true;

            let baseDelta = 0;
            if (isBaseFront) {
                baseDelta = (id[0] === 'F') ? amount : (12 - amount) % 12;
            } else {
                baseDelta = (id[0] === 'B') ? amount : (12 - amount) % 12;
            }

            if (isBaseFront) {
                Object.keys(F_links).forEach(pin => {
                    if (state.pins[pin] === true) {
                        F_links[pin].forEach(clockId => {
                            deltas[clockId] = baseDelta;
                        });
                    }
                });
            } else {
                Object.keys(B_links).forEach(pin => {
                    if (state.pins[pin] === false) {
                        B_links[pin].forEach(clockId => {
                            deltas[clockId] = baseDelta;
                        });
                    }
                });
            }

            // 四隅の裏表逆回転ルールを適用
            const cornersToCheck = isBaseFront ? ['F00', 'F20', 'F02', 'F22'] : ['B00', 'B20', 'B02', 'B22'];
            cornersToCheck.forEach(cId => {
                if (deltas[cId] > 0) {
                    const oppId = oppositeCorner[cId];
                    deltas[oppId] = (12 - deltas[cId]) % 12;
                }
            });

            // 最終決定した回転量を一斉に適用
            for (let cKey in deltas) {
                state.clocks[cKey] = (state.clocks[cKey] + deltas[cKey]) % 12;
            }
        }

        function getRandomAmount() {
            const val = Math.floor(Math.random() * 12) - 5;
            if (val >= 0) return `${val}+`;
            return `${Math.abs(val)}-`;
        }

        function generateScrambleText() {
            const frontOps = ['UR', 'DR', 'DL', 'UL', 'U', 'R', 'D', 'L', 'ALL'];
            const backOps = ['U', 'R', 'D', 'L', 'ALL'];

            let moves = [];
            frontOps.forEach(op => { moves.push(`${op}${getRandomAmount()}`); });
            moves.push('y2');
            backOps.forEach(op => { moves.push(`${op}${getRandomAmount()}`); });

            state.scrambleMoves = moves;
            moveFirst();
        }

        function renderScrambleHTML() {
            const container = document.getElementById('scramble-text');
            container.innerHTML = '';

            state.scrambleMoves.forEach((move, index) => {
                const span = document.createElement('span');
                span.className = 'move-item';
                span.innerText = move;

                if (index < state.currentMoveIndex) {
                    span.classList.add('done');
                } else if (index === state.currentMoveIndex) {
                    span.classList.add('current');
                } else {
                    span.classList.add('pending');
                }
                container.appendChild(span);
            });
        }

        function applyMoveAt(index, isForward) {
            if (index < 0 || index >= state.scrambleMoves.length) return;
            const move = state.scrambleMoves[index];

            if (move === 'y2') {
                return;
            }

            const match = move.match(/^([A-Z]+)(\d+)([\+\-])/);
            if (!match) return;

            const op = match[1];           // 例: "UR", "U", "ALL"
            let amount = parseInt(match[2]);
            const sign = match[3];

            // index が 9 (10手目のy2) より大きい場合は裏面操作手順(U, D, L, R, ALL)として処理
            let opRules = {};
            if (index <= 8) {
                // 表面セグメント (1〜9手目)
                opRules = {
                    'UR': { pins: { UL: false, UR: true, DL: false, DR: false }, axis: 'F20' },
                    'DR': { pins: { UL: false, UR: false, DL: false, DR: true }, axis: 'F22' },
                    'DL': { pins: { UL: false, UR: false, DL: true, DR: false }, axis: 'F02' },
                    'UL': { pins: { UL: true, UR: false, DL: false, DR: false }, axis: 'F00' },
                    'U': { pins: { UL: true, UR: true, DL: false, DR: false }, axis: 'F00' },
                    'R': { pins: { UL: false, UR: true, DL: false, DR: true }, axis: 'F20' },
                    'D': { pins: { UL: false, UR: false, DL: true, DR: true }, axis: 'F02' },
                    'L': { pins: { UL: true, UR: false, DL: true, DR: false }, axis: 'F00' },
                    'ALL': { pins: { UL: true, UR: true, DL: true, DR: true }, axis: 'F00' }
                };
            } else {
                // 裏面セグメント (11〜14手目) 
                opRules = {
                    'U': { pins: { UL: false, UR: false, DL: true, DR: true }, axis: 'B20' },
                    'R': { pins: { UL: false, UR: true, DL: false, DR: true }, axis: 'B20' },
                    'D': { pins: { UL: true, UR: true, DL: false, DR: false }, axis: 'B22' },
                    'L': { pins: { UL: true, UR: false, DL: true, DR: false }, axis: 'B00' },
                    'ALL': { pins: { UL: false, UR: false, DL: false, DR: false }, axis: 'B20' }
                };
            }

            if (!opRules[op]) return;

            // 1. ピンの自動同期
            const rule = opRules[op];
            Object.keys(state.pins).forEach(p => {
                state.pins[p] = rule.pins[p];
            });

            // 2. 回転量の算出
            if (sign === '-') {
                amount = (12 - amount) % 12;
            }
            if (!isForward) {
                amount = (12 - amount) % 12; // 戻る時は逆回転
            }

            // 3. 連動コアエンジンの駆動
            rotateEngine(rule.axis, amount);
        }

        // 復元用：現在のインデックスを元に正しいピンの形状を復旧させる関数
        function restorePinsForCurrentIndex() {
            if (state.currentMoveIndex >= 0 && state.currentMoveIndex < state.scrambleMoves.length) {
                const curMove = state.scrambleMoves[state.currentMoveIndex];
                if (curMove === 'y2') {
                    return;
                }
                const match = curMove.match(/^([A-Z]+)/);
                if (match) {
                    const op = match[1];
                    if (state.currentMoveIndex <= 8) {
                        const frontRules = {
                            'UR': { UL: false, UR: true, DL: false, DR: false },
                            'DR': { UL: false, UR: false, DL: false, DR: true },
                            'DL': { UL: false, UR: false, DL: true, DR: false },
                            'UL': { UL: true, UR: false, DL: false, DR: false },
                            'U': { UL: true, UR: true, DL: false, DR: false },
                            'D': { UL: false, UR: false, DL: true, DR: true },
                            'L': { UL: true, UR: false, DL: true, DR: false },
                            'R': { UL: false, UR: true, DL: false, DR: true },
                            'ALL': { UL: true, UR: true, DL: true, DR: true }
                        };
                        if (frontRules[op]) {
                            Object.keys(state.pins).forEach(p => state.pins[p] = frontRules[op][p]);
                            return;
                        }
                    } else {
                        const backRules = {
                            'U': { UL: false, UR: false, DL: true, DR: true },
                            'R': { UL: false, UR: true, DL: false, DR: true },
                            'D': { UL: true, UR: true, DL: false, DR: false },
                            'L': { UL: true, UR: false, DL: true, DR: false },
                            'ALL': { UL: false, UR: false, DL: false, DR: false }
                        };
                        if (backRules[op]) {
                            Object.keys(state.pins).forEach(p => state.pins[p] = backRules[op][p]);
                            return;
                        }
                    }
                }
            }
            // 初期状態（-1）などはALL down
            Object.keys(state.pins).forEach(p => state.pins[p] = false);
        }

        function moveFirst() {
            initDataState();
            Object.keys(state.pins).forEach(p => state.pins[p] = false);
            state.currentMoveIndex = -1;
            renderScrambleHTML();
            renderAllDisplays();
        }

        function movePrev() {
            if (state.currentMoveIndex >= 0) {
                applyMoveAt(state.currentMoveIndex, false);
                state.currentMoveIndex--;
                restorePinsForCurrentIndex();
                renderScrambleHTML();
                renderAllDisplays();
            }
        }

        function moveNext() {
            if (state.currentMoveIndex < state.scrambleMoves.length) {
                state.currentMoveIndex++;
                applyMoveAt(state.currentMoveIndex, true);
                renderScrambleHTML();
                renderAllDisplays();
            }
        }

        function moveLast() {
            while (state.currentMoveIndex < state.scrambleMoves.length - 1) {
                moveNext();
            }
        }

        initBoards();
    </script>
</body>

</html>

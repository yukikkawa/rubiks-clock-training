                    flipSpan.className = 'move-part part-flip';
                    flipSpan.innerText = parts[0];
                    item.appendChild(flipSpan);
                } else {
                    const pinSpan = document.createElement('span');
                    pinSpan.className = 'move-part part-pins';
                    pinSpan.innerText = parts[0] || '';
                    item.appendChild(pinSpan);

                    const slash1 = document.createElement('span');
                    slash1.className = 'move-slash';
                    slash1.innerText = '/';
                    item.appendChild(slash1);

                    const leftSpan = document.createElement('span');
                    leftSpan.className = 'move-part part-left';
                    leftSpan.innerText = parts[1] || '';
                    item.appendChild(leftSpan);

                    if (parts.length > 2) {
                        const slash2 = document.createElement('span');
                        slash2.className = 'move-slash';
                        slash2.innerText = '/';
                        item.appendChild(slash2);

                        const rightSpan = document.createElement('span');
                        rightSpan.className = 'move-part part-right';
                        rightSpan.innerText = parts[2] || '';
                        item.appendChild(rightSpan);
                    }
                }
                container.appendChild(item);
            });
        }
        function getPhysicalIdForMn(name) {
            const isBack = name === name.toLowerCase();
            const upper = name.toUpperCase();
            if (!isBack) {
                const coordF = { 'U': '10', 'L': '01', 'R': '21', 'D': '12', 'C': '11', 'UL': '00', 'UR': '20', 'DL': '02', 'DR': '22' };
                return 'F' + coordF[upper];
            } else {
                if (state.flipMode === 'x2') {
                    const coordBX2 = { 'UL': '22', 'U': '12', 'UR': '02', 'L': '21', 'C': '11', 'R': '01', 'DL': '20', 'D': '10', 'DR': '00' };
                    return 'B' + coordBX2[upper];
                } else {
                    const coordBY2 = { 'UL': '00', 'U': '10', 'UR': '20', 'L': '01', 'C': '11', 'R': '21', 'DL': '02', 'D': '12', 'DR': '22' };
                    return 'B' + coordBY2[upper];
                }
            }
        }

        // 【追加】UI表示領域の確保
        function ensureMnDisplayContainer() {
            let container = document.getElementById('mn-display-area');
            if (!container) {
                const methodSelect = document.getElementById('solve-method');
                if (methodSelect) {
                    container = document.createElement('div');
                    container.id = 'mn-display-area';
                    // ドロップダウンの直後に挿入
                    methodSelect.insertAdjacentElement('afterend', container);
                }
            }
            return container;
        }
        // 【追加】Mnの数値ホバー/タップ時の処理（下線・数式表示・矢印描画）
        function handleMnEnter(el) {
            el.style.borderBottom = '5px solid #000';

            const formulaDisplay = document.getElementById('mn-formula-display');
            if (formulaDisplay) {
                formulaDisplay.innerText = el.getAttribute('data-formula').split('+').join(' + ');
            }

            const rawFormula = el.getAttribute('data-raw-formula');
            drawMnArrows(rawFormula);
        }

        // 【追加】Mnの数値ホバー/タップ解除時の処理（消去）
        function handleMnLeave(el) {
            el.style.borderBottom = '5px solid transparent';

            const formulaDisplay = document.getElementById('mn-formula-display');
            if (formulaDisplay) {
                formulaDisplay.innerText = '';
            }

            clearMnArrows();
        }
        // 【修正】UIを描画する関数（タイマー時の ? マスク処理を追加）
        function renderMnDisplay() {
            const container = document.getElementById('mn-display-area');
            if (!container) return;

            const methodData = SOLVE_METHODS[state.currentMethod];
            if (!methodData || !methodData.formulas) {
                container.innerHTML = '';
                container.classList.remove('show');
                return;
            }

            container.classList.add('show');

            let html = `<div class="mn-values-row">`;

            Object.keys(state.mFormulas).forEach(key => {
                const formula = state.mFormulas[key];
                let val = state.mValues[key];
                if (val > 6) val -= 12;

                // タイマー作動中なら「?」、それ以外なら計算された数字
                const displayStr = state.isTimerRunning ? '?' : val;
                html += `<span class="mn-value-item" 
                            data-formula="${key} = ${formula}" 
                            data-raw-formula="${formula}" 
                            onmouseenter="handleMnEnter(this)"
                            onmouseleave="handleMnLeave(this)"
                            ontouchstart="handleMnEnter(this)"
                            ontouchend="handleMnLeave(this)">
                            ${displayStr}
                        </span>`;
            });

            html += `</div>`;
            html += `<div id="mn-formula-display"></div>`;

            container.innerHTML = html;
        }

        function analyzeMethodCalculations() {
            state.mValues = {};
            state.mFormulas = {};

            const methodData = SOLVE_METHODS[state.currentMethod];

            // 数式が定義されていない解法（Flipなど）なら、表示を更新して終了
            if (!methodData || !methodData.formulas) {
                renderMnDisplay();
                return;
            }

            const getDelta = (start, end) => {
                const sId = getPhysicalIdForMn(start);
                const eId = getPhysicalIdForMn(end);
                const sVal = state.clocks[sId] || 0;
                const eVal = state.clocks[eId] || 0;
                return (eVal - sVal + 12) % 12;
            };

            state.mFormulas = methodData.formulas;

            Object.keys(state.mFormulas).forEach(mKey => {
                const formula = state.mFormulas[mKey];
                const parts = formula.split('+');
                let total = 0;
                parts.forEach(part => {
                    if (part.includes('->')) {
                        const [start, end] = part.split('->');
                        total = (total + getDelta(start, end)) % 12;
                    }
                    else {
                        const single = getPhysicalIdForMn(part);
                        total = (total + state.clocks[single] || 0) % 12;
                    }
                });
                state.mValues[mKey] = total;
            });

            renderMnDisplay();
        }

        function getMValuesDebugString() {
            if (!state.mValues || Object.keys(state.mValues).length === 0) return '';
            return `<br>• <b class="debug-m-label">M (Calculated)</b> : ` +
                Object.keys(state.mValues).map(k => `${k}=${state.mValues[k]}`).join(', ');
        }

        // 【修正】解法を切り替えた際、時計の針をスクランブル直後（0手目）に完全リセットする
        function changeSolveMethod(methodKey) {
            state.currentMethod = methodKey;
            // 【追加】選択された解法をブラウザに保存する
            localStorage.setItem('savedSolveMethod', methodKey);
            const methodData = SOLVE_METHODS[methodKey];
            state.solveMoves = methodData.moves;
            state.mValues = {};
            setFlipMode(methodData.mode);
            analyzeMethodCalculations();

            state.solveAmounts = new Array(state.solveMoves.length).fill(null).map(() => ({ left: 0, right: 0 }));

            // もし解法が途中で進んでいたら、盤面の時計の針を「スクランブル直後の状態」に物理的に戻す
            if (state.currentSolveIndex >= 0) {
                initDataState();
                state.currentMoveIndex = -1;
                while (state.currentMoveIndex < state.scrambleMoves.length) {
                    state.currentMoveIndex++;
                    applyMoveAt(state.currentMoveIndex, true);
                }
            }

            // 解法の進捗（インデックスや矢印、ハイライトなど）を完全にリセット
            resetSolveProgressState();

            // 盤面とボタンの有効状態を更新して再描画
            renderAllDisplays(false);
            updateSolveButtonsState();
        }

        function resetSolveProgressState() {
            state.currentSolveIndex = -1;
            state.currentSolveFace = 'F';
            analyzeMethodCalculations();
            document.querySelectorAll('.pin-highlight-ring, .solve-arrow-svg, .arc-indicator').forEach(el => el.remove());

            renderSolutionHTML();
            setDebugToIdle();
        }

        function getCurrentFlipType() {
            return getSolveFaceAndFlipAtIndex(state.currentSolveIndex).lastFlip;
        }

        function updateCurrentSolveFace() {
            state.currentSolveFace = getSolveFaceAndFlipAtIndex(state.currentSolveIndex).face;
        }
        function applySolveMoveAt(index, isForward) {
            if (index < 0 || index >= state.solveMoves.length) return;
            const move = state.solveMoves[index];
            updateCurrentSolveFace();
            const face = state.currentSolveFace;
            const lastFlip = getCurrentFlipType();

            if (move === 'y2' || move === 'x2') {
                document.querySelectorAll('.arc-indicator, .pin-highlight-ring, .solve-arrow-svg').forEach(el => el.remove());
                const debugEl = document.getElementById('solve-debug');
                if (debugEl) {
                    // 【修正 1箇所目】
                    debugEl.innerHTML = `DEBUG: [手順 ${index + 1}]<br>• <b>currentSolveFace</b> : ${face}<br>• <b>F (Flip)</b> : ${move}` + getMValuesDebugString();
                }
                return;
            }

            // 新ルール: [ピン] / [左手の操作] / [右手の操作]
            const mainParts = move.split('/');
            if (mainParts.length < 3) return;
            const pinStr = mainParts[0];
            const leftOpStr = mainParts[1];
            const rightOpStr = mainParts[2];

            const clockMap = {
                'UL': `${face}00`, 'U': `${face}10`, 'UR': `${face}20`,
                'L': `${face}01`, 'C': `${face}11`, 'R': `${face}21`,
                'DL': `${face}02`, 'D': `${face}12`, 'DR': `${face}22`
            };
            const dialMap = { 'UL': `${face}00`, 'UR': `${face}20`, 'DL': `${face}02`, 'DR': `${face}22` };
            const isX2Step = (face === 'B' && lastFlip === 'x2');

            const internalUpPins = pinStr.split(',').map(p => (p && isX2Step) ? X2_ROTATE[p] || p : p);
            applyPinsToState(internalUpPins, face);

            if (isForward) {
                state.solveAmounts[index] = { left: 0, right: 0 };
            }

            const debugOpLines = [];
            const axisIds = { left: null, right: null };

            const opInfoList = buildOpInfoList(leftOpStr, rightOpStr);

            const processList = isForward ? opInfoList : [...opInfoList].reverse();
            processList.forEach(info => {
                if (!info.op || info.op === '-') return;

                const opParts = info.op.split(':');
                if (opParts.length !== 2) return;

                const dialStr = opParts[0];
                const targetCalc = opParts[1];
                const internalDial = isX2Step ? (X2_ROTATE[dialStr] || dialStr) : dialStr;

                let amount = 0;
                if (isForward) {
                    if (state.mValues && state.mValues[targetCalc] !== undefined) {
                        amount = state.mValues[targetCalc];
                    } else {
                        const calcMatch = targetCalc.match(/^(.+)->(.+)$/);
                        if (calcMatch) {
                            let targetName = calcMatch[1];
                            let destName = calcMatch[2];

                            if (isX2Step) {
                                targetName = X2_ROTATE[targetName] || targetName;
                                if (destName !== '12') destName = X2_ROTATE[destName] || destName;
                            }

                            const currentTarget = state.clocks[clockMap[targetName]] || 0;
                            if (destName === '12') {
                                amount = (12 - currentTarget) % 12;
                            } else {
                                const currentDest = state.clocks[clockMap[destName]] || 0;
                                amount = (currentDest - currentTarget + 12) % 12;
                            }
                        }
                    }
                    // ★ 修正：左手なら 'left'、右手なら 'right' に確実に保存
                    state.solveAmounts[index][info.type] = amount;
                } else {
                    // ★ 修正：戻る時は、自分の手の担当分 ('left' または 'right') を確実に取り出す
                    const savedAmount = state.solveAmounts[index] ? state.solveAmounts[index][info.type] || 0 : 0;
                    amount = (12 - savedAmount) % 12;
                }

                const axisId = dialMap[internalDial];
                if (axisId) {
                    rotateEngine(axisId, amount);
                    axisIds[info.type] = axisId;
                }

                // デバッグ表示も順番通りに push するようにシンプル化
                debugOpLines.push(`• <b style="color: ${info.color}">Z (${info.label})</b> : ${dialStr} (物理軸: ${axisId}) ➔ <b>X</b> : ${amount > 0 ? '+' + amount : amount} (記憶: ${state.solveAmounts[index] ? state.solveAmounts[index][info.type] : 0})`);
            });

            const debugEl = document.getElementById('solve-debug');
            if (debugEl) {
                // (以下そのまま)
                debugEl.innerHTML = `DEBUG: [手順 ${index + 1}]<br>` +
                    `• <b>currentSolveFace</b> : ${face}<br>` +
                    `• <b>Y (Pins)</b> : ${pinStr}<br>` +
                    debugOpLines.join('<br>') + `<br>` +
                    `• <b>F (Flip)</b> : なし` + getMValuesDebugString();
            }

            drawArcIndicators(axisIds);
            drawSolveVisuals(pinStr, opInfoList);
        }
        function restoreSolvePinsForCurrentIndex() {
            if (state.currentSolveIndex >= 0 && state.currentSolveIndex < state.solveMoves.length) {
                const move = state.solveMoves[state.currentSolveIndex];
                let targetPinStr = "";
                let targetIndex = state.currentSolveIndex; // ピン指定が書かれている手のインデックス

                if (move === 'y2' || move === 'x2') {
                    // アーク（円弧）を消去する
                    document.querySelectorAll('.arc-indicator').forEach(el => el.remove());

                    // 直前のピン操作を探して取得する
                    for (let i = state.currentSolveIndex - 1; i >= 0; i--) {
                        const m = state.solveMoves[i];
                        if (m !== 'y2' && m !== 'x2') {
                            const parts = m.split('/');
                            if (parts.length >= 3) {
                                targetPinStr = parts[0];
                                targetIndex = i; // 見つけたピン操作の手のインデックスを保持
                                break;
                            }
                        }
                    }
                } else {
                    const mainParts = move.split('/');
                    if (mainParts.length >= 3) {
                        targetPinStr = mainParts[0];
                    } else {
                        Object.keys(state.pins).forEach(p => state.pins[p] = false);
                        return;
                    }
                }

                const { face, lastFlip } = getSolveFaceAndFlipAtIndex(targetIndex);
                const isX2Step = (face === 'B' && lastFlip === 'x2');
                const upPins = targetPinStr.split(',').map(p => (p && isX2Step) ? X2_ROTATE[p] || p : p).filter(p => p);
                applyPinsToState(upPins, face);
                return;
            }

            // 範囲外（-1など未開始時）は全てfalseにする
            Object.keys(state.pins).forEach(p => state.pins[p] = false);
        }

        function solveFirst() {
            const savedMoves = [...state.scrambleMoves];
            const savedCurrentScramble = state.currentMoveIndex;
            moveFirst(true);
            state.scrambleMoves = savedMoves;
            while (state.currentMoveIndex < savedCurrentScramble)
                moveNext();
            analyzeMethodCalculations();
            state.currentSolveIndex = -1;
            state.currentSolveFace = 'F';
            renderSolutionHTML();
            renderAllDisplays(false);
            document.querySelectorAll('.pin-highlight-ring, .solve-arrow-svg').forEach(el => el.remove());
            setDebugToIdle();
        }

        function solvePrev() {
            if (state.currentSolveIndex >= 0) {
                applySolveMoveAt(state.currentSolveIndex, false);
                state.currentSolveIndex--;
                updateCurrentSolveFace();
                restoreSolvePinsForCurrentIndex();
                if (state.currentSolveIndex >= 0) {
                    const backupAmounts = [...state.solveAmounts];
                    applySolveMoveAt(state.currentSolveIndex, true);
                    applySolveMoveAt(state.currentSolveIndex, false);
                    state.solveAmounts = backupAmounts;
                    const curMove = state.solveMoves[state.currentSolveIndex];
                    if (curMove !== 'y2' && curMove !== 'x2') {
                        const mainParts = curMove.split('/');
                        drawSolveVisuals(mainParts[0], buildOpInfoList(mainParts[1], mainParts[2]));
                    }
                } else {
                    drawArcIndicators([]);
                    document.querySelectorAll('.pin-highlight-ring, .solve-arrow-svg').forEach(el => el.remove());
                    setDebugToIdle();
                }
                renderSolutionHTML();
                renderAllDisplays(false, false);
            }
        }

        function solveNext() {
            if (state.currentSolveIndex < state.solveMoves.length - 1) {
                state.currentSolveIndex++;
                updateCurrentSolveFace();
                applySolveMoveAt(state.currentSolveIndex, true);
                renderSolutionHTML();
                renderAllDisplays(false, true);
            }
        }

        // 最後の手順まで進む
        function solveLast() {
            while (state.currentSolveIndex < state.solveMoves.length - 1) solveNext();
        }

        // -------------------------------------------------------------------
        // 矢印と描画関連の共通関数群
        // -------------------------------------------------------------------

        // 【共通】画面上の時計座標マップ（boardを基準に、各ダイヤルの中心をパーセンテージで返す）
        const DIAL_NAME_TO_GRID = {
            'UL': 'F00', 'U': 'F10', 'UR': 'F20',
            'L': 'F01', 'C': 'F11', 'R': 'F21',
            'DL': 'F02', 'D': 'F12', 'DR': 'F22'
        };

        function getVisualCoord(dialName) {
            const clockId = DIAL_NAME_TO_GRID[dialName];
            if (!clockId) return null;

            const clockEl = document.getElementById(`container-${clockId}`);
            const board = document.getElementById('board-front');
            if (!clockEl || !board) return null;

            const boardRect = board.getBoundingClientRect();
            const clockRect = clockEl.getBoundingClientRect();

            // position: absolute の矢印SVGはborderを除いたpadding boxを基準に配置される。
            // getBoundingClientRect()はborder-boxを返すため、border幅を差し引いて基準を合わせる。
            const boardStyle = window.getComputedStyle(board);
            const borderLeft = parseFloat(boardStyle.borderLeftWidth) || 0;
            const borderTop = parseFloat(boardStyle.borderTopWidth) || 0;

            const innerLeft = boardRect.left + borderLeft;
            const innerTop = boardRect.top + borderTop;
            const innerWidth = boardRect.width - borderLeft * 2;
            const innerHeight = boardRect.height - borderTop * 2;

            const x = ((clockRect.left + clockRect.width / 2) - innerLeft) / innerWidth * 100;
            const y = ((clockRect.top + clockRect.height / 2) - innerTop) / innerHeight * 100;
            return [x, y];
        }

        // 後方互換のためのラッパー（固定マップとして使われる箇所用）
        const VISUAL_COORD_MAP = new Proxy({}, {
            get(_, key) { return getVisualCoord(key); }
        });

        // 【共通】始点と終点の名前から、矢印を描画する座標を計算する関数
        function calculateArrowPoints(startName, endName, isBackAndX2) {
            const rawStart = VISUAL_COORD_MAP[startName];
            if (!rawStart) return null;

            if (endName === '12') {
                const noonMargin = 8;
                const endPt = [rawStart[0], rawStart[1] + (isBackAndX2 ? noonMargin : -noonMargin)];
                return { startPt: rawStart, endPt: endPt };
            }

            const rawEnd = VISUAL_COORD_MAP[endName];
            if (!rawEnd) return null;

            const dx = rawEnd[0] - rawStart[0];
            const dy = rawEnd[1] - rawStart[1];
            const len = Math.sqrt(dx * dx + dy * dy);
            if (len === 0) return null;

            const startMargin = 3; // 矢印の両端の余白
            const endMargin = 8; // 矢印の両端の余白
            return {
                startPt: [rawStart[0] + (dx / len) * startMargin, rawStart[1] + (dy / len) * startMargin],
                endPt: [rawEnd[0] - (dx / len) * endMargin, rawEnd[1] - (dy / len) * endMargin]
            };
        }

        // 【共通】指定されたボードに矢印SVG要素を生成して追加する関数
        function drawArrow(board, startPt, endPt, color, markerIdSuffix, customClass = "") {
            const svgNS = "http://www.w3.org/2000/svg";
            const arrowSvg = document.createElementNS(svgNS, "svg");

            arrowSvg.setAttribute("class", `solve-arrow-svg ${customClass}`);
            arrowSvg.setAttribute("viewBox", "0 0 100 100");
            if (customClass) arrowSvg.style.pointerEvents = "none";

            // marker等のSVG内部要素も createElementNS で生成しないとブラウザが認識しない
            const defs = document.createElementNS(svgNS, "defs");
            const marker = document.createElementNS(svgNS, "marker");
            const markerId = `arrow-head-${markerIdSuffix}`;

            marker.setAttribute("id", markerId);
            marker.setAttribute("viewBox", "0 0 10 10");
            marker.setAttribute("refX", "3");
            marker.setAttribute("refY", "5");
            marker.setAttribute("markerWidth", "4");
            marker.setAttribute("markerHeight", "4");
            marker.setAttribute("orient", "auto-start-reverse");

            const path = document.createElementNS(svgNS, "path");
            path.setAttribute("d", "M 0 1.5 L 8 5 L 0 8.5 z");
            path.setAttribute("fill", color);
            path.setAttribute("opacity", "0.8");

            marker.appendChild(path);
            defs.appendChild(marker);
            arrowSvg.appendChild(defs);

            const line = document.createElementNS(svgNS, "line");
            line.setAttribute("class", "solve-arrow-line");
            line.setAttribute("x1", `${startPt[0]}%`);
            line.setAttribute("y1", `${startPt[1]}%`);
            line.setAttribute("x2", `${endPt[0]}%`);
            line.setAttribute("y2", `${endPt[1]}%`);

            line.style.setProperty('stroke', color, 'important');
            line.style.setProperty('stroke-width', '3', 'important');
            // CSS側の .solve-arrow-line { marker-end: url(#solve-arrow-head); } が
            // setAttribute("marker-end", ...) より優先されてしまい、
            // 存在しないID(#solve-arrow-head)を参照し続けて矢印が描画されなくなるバグがあったため、
            // stroke等と同様に style.setProperty + important で確実に上書きする
            line.style.setProperty('marker-end', `url(#${markerId})`, 'important');

            arrowSvg.appendChild(line);
            board.appendChild(arrowSvg);
        }

        // -------------------------------------------------------------------
        // 各種機能ごとの描画関数
        // -------------------------------------------------------------------

        function clearMnArrows() {
            document.querySelectorAll('.mn-arrow-temp').forEach(el => el.remove());
        }

        function drawMnArrows(formula) {
            clearMnArrows();
            const parts = formula.split('+');

            parts.forEach((part, index) => {
                // 「->」が含まれる場合（これまで通りの矢印を描画）
                if (part.includes('->')) {
                    const [start, end] = part.split('->');
                    if (!start || !end) return;

                    const isBack = start === start.toLowerCase();
                    const face = isBack ? 'B' : 'F';
                    const board = document.getElementById(face === 'F' ? 'board-front' : 'board-back');
                    if (!board) return;

                    const pts = calculateArrowPoints(start.toUpperCase(), end.toUpperCase(), false);
                    if (pts) {
                        // 紫色で描画
                        drawArrow(board, pts.startPt, pts.endPt, '#9c36b5', `mn-${index}`, 'mn-arrow-temp');
                    }
                } else {
                    // 「->」が含まれない単一の時計指定の場合（時計を丸でハイライト）
                    const clockName = part.trim();
                    if (!clockName) return;

                    const isBack = clockName === clockName.toLowerCase();
                    const face = isBack ? 'B' : 'F';
                    const board = document.getElementById(face === 'F' ? 'board-front' : 'board-back');
                    if (!board) return;

                    // 見た目上の座標を取得
                    const rawCoord = VISUAL_COORD_MAP[clockName.toUpperCase()];
                    if (!rawCoord) return;

                    const svgNS = "http://www.w3.org/2000/svg";
                    const circleSvg = document.createElementNS(svgNS, "svg");
                    circleSvg.setAttribute("class", "solve-arrow-svg mn-arrow-temp");
                    circleSvg.setAttribute("viewBox", "0 0 100 100");
                    circleSvg.style.pointerEvents = "none";

                    // 対象の時計を囲む円(circle)を生成
                    const circle = document.createElementNS(svgNS, "circle");
                    circle.setAttribute("cx", `${rawCoord[0]}`);
                    circle.setAttribute("cy", `${rawCoord[1]}`);
                    circle.setAttribute("r", "12.5"); // 時計をちょうど囲むくらいの半径
                    circle.setAttribute("fill", "none");

                    // 矢印と同じ太さと色で描画
                    circle.style.setProperty('stroke', '#9c36b5', 'important');
                    circle.style.setProperty('stroke-width', '3', 'important');
                    circle.style.setProperty('opacity', '0.8', 'important');

                    circleSvg.appendChild(circle);
                    board.appendChild(circleSvg);
                }
            });
        }

        function drawSolveVisuals(pinStr, opInfoList) {
            document.querySelectorAll('.pin-highlight-ring, .solve-arrow-svg').forEach(el => el.remove());
            const face = state.currentSolveFace;
            const board = document.getElementById(face === 'F' ? 'board-front' : 'board-back');
            if (!board) return;

            drawSolvePins(pinStr, face, board);
            drawSolveOperations(opInfoList, face, board);
        }

        // ピンのハイライトを描画する処理（drawSolveVisualsから切り出し）
        function drawSolvePins(pinStr, face, board) {
            const upPins = pinStr ? pinStr.split(',') : [];
            const isBack = (face === 'B');
            const lastFlip = getCurrentFlipType();
            const shouldRotate = isBack && (state.flipMode !== lastFlip);
            const pinPos = { 'UL': ['36%', '36%'], 'UR': ['64%', '36%'], 'DL': ['36%', '64%'], 'DR': ['64%', '64%'] };

            const currentLogicalPins = { UL: false, UR: false, DL: false, DR: false };
            upPins.forEach(p => {
                if (p) currentLogicalPins[p] = true;
            });

            const prevLogicalPins = getPrevLogicalPins();

            // 4つ全てのピンについて、前回と状態が変わっているか比較する
            Object.keys(currentLogicalPins).forEach(p => {
                if (currentLogicalPins[p] === prevLogicalPins[p]) return;

                const visualPin = shouldRotate ? X2_ROTATE[p] : p;
                const pos = pinPos[visualPin];
                if (!pos) return;

                const ring = document.createElement('div');
                // 上がったなら ring-up(オレンジ)、下がったなら ring-down(紺色の点線)
                ring.className = `pin-highlight-ring ${currentLogicalPins[p] ? 'ring-up' : 'ring-down'}`;
                ring.style.left = pos[0];
                ring.style.top = pos[1];
                board.appendChild(ring);
            });
        }

        // 1手前のピン状態を取得する処理（ネストを浅くするため分離）
        // 1手前のピン状態を取得する処理（持ち替えによる裏面の視点反転を考慮）
        function getPrevLogicalPins() {
            const prevLogicalPins = { UL: false, UR: false, DL: false, DR: false };

            const prevIndex = state.currentSolveIndex - 1;
            if (prevIndex < 0) return prevLogicalPins;

            const prevMove = state.solveMoves[prevIndex];

            // 1つ前が持ち替え操作だった場合
            if (prevMove === 'y2' || prevMove === 'x2') {
                // さらにその前の操作（通常操作）を探す
                let baseMove = null;
                for (let i = prevIndex - 1; i >= 0; i--) {
                    if (state.solveMoves[i] !== 'y2' && state.solveMoves[i] !== 'x2') {
                        baseMove = state.solveMoves[i];
                        break;
                    }
                }

                if (!baseMove) return prevLogicalPins;

                const parts = baseMove.split('/');
                const basePins = { UL: false, UR: false, DL: false, DR: false };
                parts[0].split(',').forEach(p => {
                    if (p && basePins[p] !== undefined) basePins[p] = true;
                });

                // 表面で「下がっている(DOWN)」ピンが、裏面からは「上がって(UP)」見える。
                // それに持ち替えの視点移動（左右反転 or 180度反転）を適用してマッピングする。
                if (prevMove === 'y2') {
                    // y2 (左右反転)
                    if (!basePins['UL']) prevLogicalPins['UR'] = true;
                    if (!basePins['UR']) prevLogicalPins['UL'] = true;
                    if (!basePins['DL']) prevLogicalPins['DR'] = true;
                    if (!basePins['DR']) prevLogicalPins['DL'] = true;
                } else if (prevMove === 'x2') {
                    // x2 (180度反転/対角反転)
                    if (!basePins['UL']) prevLogicalPins['DL'] = true;
                    if (!basePins['UR']) prevLogicalPins['DR'] = true;
                    if (!basePins['DL']) prevLogicalPins['UL'] = true;
                    if (!basePins['DR']) prevLogicalPins['UR'] = true;
                }
            } else {
                // 1つ前が通常操作なら、そのピン状態をそのまま返す
                const parts = prevMove.split('/');
                if (parts.length >= 3) {
                    parts[0].split(',').forEach(p => {
                        if (p && prevLogicalPins[p] !== undefined) {
                            prevLogicalPins[p] = true;
                        }
                    });
                }
            }

            return prevLogicalPins;
        }

        // 矢印（操作）を描画する処理（差し替え）
        function drawSolveOperations(opInfoList, face, board) {
            const isBack = (face === 'B');
            const lastFlip = getCurrentFlipType();
            const shouldRotate = isBack && (state.flipMode !== lastFlip);

            opInfoList.forEach(info => {
                if (!info.op || info.op === '-') return;

                const opParts = info.op.split(':');
                if (opParts.length !== 2) return;

                const dialStr = opParts[0];
                const targetCalc = opParts[1];
                const calcMatch = targetCalc.match(/^(.+)->(.+)$/);

                if (calcMatch) {
                    // 通常の「A->B」の矢印描画
                    const vStart = shouldRotate ? (X2_ROTATE[calcMatch[1]] || calcMatch[1]) : calcMatch[1];
                    const vEnd = shouldRotate ? (X2_ROTATE[calcMatch[2]] || calcMatch[2]) : calcMatch[2];
                    const isBackAndX2 = isBack && state.flipMode === 'x2';

                    const pts = calculateArrowPoints(vStart, vEnd, isBackAndX2);
                    if (pts) {
                        drawArrow(board, pts.startPt, pts.endPt, info.color, info.type);
                    }
                } else if (state.mFormulas && state.mFormulas[targetCalc]) {
                    // 【追加】M1〜M6 等の変数の場合、ダイヤル付近に文字ラベルを描画する
                    const vDial = shouldRotate ? (X2_ROTATE[dialStr] || dialStr) : dialStr;
                    drawMnLabel(board, vDial, targetCalc, info.color);
                }
            });
        }

        // 【追加】Mnの文字ラベルを描画する関数
        function drawMnLabel(board, dialName, textStr, color) {
            const rawCoord = VISUAL_COORD_MAP[dialName];
            if (!rawCoord) return;

            const label = document.createElement('div');
            label.className = 'solve-mn-label solve-arrow-svg';
            label.innerText = textStr;

            // ズレ幅（オフセット）をパーセンテージ指定にして、画面幅に関わらず位置比率を保持する
            let offsetX = 0;
            let offsetY = 0;

            if (dialName.includes('L')) offsetX = -8;
            if (dialName.includes('R')) offsetX = 8;
            if (dialName.includes('U')) offsetY = -20;
            if (dialName.includes('D')) offsetY = 20;

            // 計算したパーセンテージオフセットを適用
            label.style.left = `${rawCoord[0] + offsetX}%`;
            label.style.top = `${rawCoord[1] + offsetY}%`;
            label.style.color = color;

            board.appendChild(label);
        }

        initBoards();
    </script>
</body>

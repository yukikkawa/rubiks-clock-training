<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7-Simul 練習アプリ - 物理反転ロジック</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f1f3f5;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            background: white;
            padding: 20px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
            width: 100%;
            max-width: 440px;
        }
        h2 { margin: 0 0 5px 0; color: #212529; font-size: 20px; }
        .description { font-size: 12px; color: #868e96; margin-bottom: 15px; }

        .mode-container {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn-mode {
            flex: 1;
            max-width: 120px;
            padding: 8px 16px;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ced4da;
            background-color: #fff;
            color: #495057;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
        }
        .btn-mode.active {
            background-color: #e2e6ea;
            border-color: #495057;
            color: #212529;
        }

        .clock-wrapper {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
            margin-bottom: 20px;
        }

        .clock-board {
            position: relative;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            border: 4px solid #495057;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 6px;
            align-items: center;
            justify-items: center;
        }
        #board-front { background: #74c0fc; border-color: #1971c2; }
        #board-back { background: #91a7ff; border-color: #3b5bdb; }

        .board-title {
            font-weight: bold;
            font-size: 14px;
            color: #495057;
            margin-bottom: 4px;
        }

        .sub-clock {
            background: #e1f5fe;
            border-radius: 50%;
            border: 2px solid #0288d1;
            width: 66px;
            height: 66px;
            cursor: pointer;
        }
        #board-back .sub-clock {
            background: #e8eaf6;
            border-color: #3f51b5;
        }

        .btn-scramble {
            background-color: #228be6;
            color: white;
            font-size: 16px;
            font-weight: bold;
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            max-width: 260px;
            box-shadow: 0 4px 12px rgba(34, 139, 230, 0.25);
        }
        .btn-scramble:active { background-color: #1c7ed6; }
    </style>
</head>
<body>

<div id="app">
    <h2>7-Simul 盤面シミュレータ</h2>
    <div class="description">※四隅の表裏対応ロジックを修正完了</div>

    <div class="mode-container">
        <button id="mode-y2" class="btn-mode active" onclick="setFlipMode('y2')">y2 (左右反転)</button>
        <button id="mode-x2" class="btn-mode" onclick="setFlipMode('x2')">x2 (上下反転)</button>
    </div>
    
    <div class="clock-wrapper">
        <div>
            <div class="board-title">表 (Front)</div>
            <div id="board-front" class="clock-board"></div>
        </div>

        <div>
            <div class="board-title">裏 (Back)</div>
            <div id="board-back" class="clock-board"></div>
        </div>
    </div>

    <button class="btn-scramble" onclick="scrambleAllClocks()">ランダムに配置</button>
</div>

<script>
    const state = {
        clocks: {}, 
        flipMode: 'y2'
    };

    function initDataState() {
        for (let x = 0; x < 3; x++) {
            for (let y = 0; y < 3; y++) {
                state.clocks[`F${x}${y}`] = 0;
                state.clocks[`B${x}${y}`] = 0;
            }
        }
    }

    function createClockSVG(id, isFront) {
        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svg.setAttribute("class", "sub-clock");
        svg.setAttribute("id", `container-${id}`);
        svg.setAttribute("viewBox", "0 0 100 100");
        
        if (isFront) {
            svg.onclick = () => rotateFrontClock(id);
        }

        const borderStroke = isFront ? "#0288d1" : "#3f51b5";

        svg.innerHTML = `
            <circle cx="50" cy="50" r="45" fill="none" stroke="${borderStroke}" stroke-width="2"/>
            <circle id="dot-${id}" cx="50" cy="12" r="3" fill="#f03e3e"/>
            <g id="ticks-${id}"></g>
            <line id="hand-${id}" x1="50" y1="50" x2="50" y2="15" stroke="#212529" stroke-width="5" stroke-linecap="round"/>
        `;
        return svg;
    }

    function renderTicks(id, isFlipped) {
        const g = document.getElementById(`ticks-${id}`);
        if (!g) return;
        g.innerHTML = '';
        const dotColor = "#495057";
        const baseAngles = [30, 60, 90, 120, 150, 180, 210, 240, 270, 300, 330];
        
        baseAngles.forEach(angle => {
            const finalAngle = isFlipped ? (angle + 180) % 360 : angle;
            const rad = (finalAngle - 90) * Math.PI / 180;
            const cx = 50 + 38 * Math.cos(rad);
            const cy = 50 + 38 * Math.sin(rad);
            g.innerHTML += `<circle cx="${cx}" cy="${cy}" r="2" fill="${dotColor}"/>`;
        });
    }

    function initBoards() {
        initDataState();
        buildDOMBoards();
        scrambleAllClocks();
    }

    function buildDOMBoards() {
        const frontBoard = document.getElementById('board-front');
        const backBoard = document.getElementById('board-back');
        frontBoard.innerHTML = '';
        backBoard.innerHTML = '';

        for (let y = 0; y < 3; y++) {
            for (let x = 0; x < 3; x++) {
                frontBoard.appendChild(createClockSVG(`F${x}${y}`, true));
            }
        }

        for (let y = 0; y < 3; y++) {
            for (let x = 0; x < 3; x++) {
                let targetX = x;
                let targetY = y;
                if (state.flipMode === 'x2') {
                    targetX = 2 - x;
                    targetY = 2 - y;
                }
                backBoard.appendChild(createClockSVG(`B${targetX}${targetY}`, false));
            }
        }
    }

    function updateClockDisplay(id, hour, isBackAndX2) {
        const hand = document.getElementById(`hand-${id}`);
        const dot = document.getElementById(`dot-${id}`);
        if (!hand || !dot) return;

        let displayHour = hour;
        if (isBackAndX2) {
            displayHour = (hour + 6) % 12;
            dot.setAttribute('cy', '88'); 
        } else {
            dot.setAttribute('cy', '12'); 
        }

        const angleRad = ((displayHour * 30) - 90) * Math.PI / 180;
        const radius = 35;
        hand.setAttribute('x2', 50 + radius * Math.cos(angleRad));
        hand.setAttribute('y2', 50 + radius * Math.sin(angleRad));

        renderTicks(id, isBackAndX2);
    }

    function renderAllDisplays() {
        const isX2 = state.flipMode === 'x2';
        for (let x = 0; x < 3; x++) {
            for (let y = 0; y < 3; y++) {
                updateClockDisplay(`F${x}${y}`, state.clocks[`F${x}${y}`], false);
                updateClockDisplay(`B${x}${y}`, state.clocks[`B${x}${y}`], isX2);
            }
        }
    }

    function setFlipMode(mode) {
        if (state.flipMode === mode) return;
        state.flipMode = mode;
        
        document.getElementById('mode-y2').classList.toggle('active', mode === 'y2');
        document.getElementById('mode-x2').classList.toggle('active', mode === 'x2');
        
        buildDOMBoards(); 
        renderAllDisplays();
    }

    // 正しい四隅の連動関係：F側が+1進むと、対応するB側が-1（+11）戻る
    function rotateFrontClock(id) {
        state.clocks[id] = (state.clocks[id] + 1) % 12;
        
        if (id === 'F20') state.clocks['B00'] = (state.clocks['B00'] + 11) % 12; // B00 = (12 - F20)
        if (id === 'F00') state.clocks['B20'] = (state.clocks['B20'] + 11) % 12; // B20 = (12 - F00)
        if (id === 'F22') state.clocks['B02'] = (state.clocks['B02'] + 11) % 12; // B02 = (12 - F22)
        if (id === 'F02') state.clocks['B22'] = (state.clocks['B22'] + 11) % 12; // B22 = (12 - F02)

        renderAllDisplays();
    }

    // 指示通りの計算式でスクランブル配置
    function scrambleAllClocks() {
        for (let x = 0; x < 3; x++) {
            for (let y = 0; y < 3; y++) {
                state.clocks[`F${x}${y}`] = Math.floor(Math.random() * 12);
            }
        }

        // ご提示の正しい計算式を反映
        state.clocks['B00'] = (12 - state.clocks['F20']) % 12;
        state.clocks['B20'] = (12 - state.clocks['F00']) % 12;
        state.clocks['B02'] = (12 - state.clocks['F22']) % 12;
        state.clocks['B22'] = (12 - state.clocks['F02']) % 12;

        const corners = ['B00', 'B02', 'B20', 'B22'];
        for (let x = 0; x < 3; x++) {
            for (let y = 0; y < 3; y++) {
                const id = `B${x}${y}`;
                if (!corners.includes(id)) {
                    state.clocks[id] = Math.floor(Math.random() * 12);
                }
            }
        }

        renderAllDisplays();
    }

    initBoards();
</script>
</body>
</html>

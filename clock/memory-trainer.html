<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>7-Simul 盤面シミュレータ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="clock-utils.js"></script>
    <style>
        body {
            background-color: #f1f3f5;
            font-family: "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Helvetica Neue", Arial, "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
            color: #333;
        }

        #app {
            max-width: 600px;
            margin: 0 auto;
            /* 中央寄せが抜けていた場合は追加すると綺麗です */
        }

        /* スクランブル表示エリア */
        .scramble-wrapper {
            position: relative;
            margin-bottom: 10px;
        }

        .scramble-container {
            border-radius: 10px;
            padding: 2px;
            font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 15px;
            line-height: 1.8;
            text-align: left;
            word-break: break-all;
            padding-right: 30px !important;
        }

        .toggle-scramble-btn-inline {
            position: absolute;
            bottom: 0px;
            right: 0px;
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #000;
            padding: 4px 8px;
            outline: none;
        }

        .slim-btn {
            padding: 2px 0 !important;
            font-size: 12px !important;
            height: 26px;
            border-radius: 6px !important;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }

        /* 各回転記号の進捗スタイル定義 */
        .move-item {
            display: inline-block;
            margin-right: 6px;
        }

        .move-item.pending {
            color: #adb5bd;
            font-weight: normal;
        }

        .move-item.done {
            color: #343a40;
            font-weight: normal;
        }

        .move-item.current {
            color: #000000;
            font-weight: bold;
            text-decoration: underline;
        }

        /* ボタン群と生成ボタンを横一列に並べるコンテナ */
        .control-panel {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            width: 100%;
        }

        .scramble-controls {
            display: flex;
            gap: 4px;
            flex: 1;
        }

        .btn-ctrl {
            flex: 1;
            padding: 6px 0;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #ced4da;
            background-color: #fff;
            color: #495057;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn-ctrl:active {
            background-color: #e2e6ea;
            border-color: #868e96;
        }

        .btn-scramble {
            background-color: #228be6;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            flex: 1;
            box-shadow: 0 4px 12px rgba(34, 139, 230, 0.25);
            white-space: nowrap;
        }

        .btn-scramble:active {
            background-color: #1c7ed6;
        }

        /* 表裏ボードを横並びにするラッパー */
        .clock-wrapper {
            display: flex;
            flex-direction: row;
            /*flex-wrap: wrap;*/
            gap: 15px;
            justify-content: center;
            align-items: center;
            margin-bottom: 5px;
        }

        .board-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .clock-board {
            container-type: inline-size;
            position: relative;
            width: min(250px, 43vw);
            height: min(250px, 43vw);
            border-radius: 50%;
            border: 4px solid #495057;
            padding: min(18px, 3vw);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: min(6px, 1vw);
            align-items: center;
            justify-items: center;
        }

        #board-front {
            background: #74c0fc;
            border-color: #1971c2;
        }

        #board-back {
            background: #91a7ff;
            border-color: #3b5bdb;
        }

        .board-title {
            font-weight: bold;
            font-size: 14px;
            color: #495057;
            margin-bottom: 6px;
        }

        .sub-clock {
            background: #e1f5fe;
            border-radius: 50%;
            border: 2px solid #0288d1;
            width: min(62px, 10.5vw);
            height: min(62px, 10.5vw);
        }

        .sub-clock.clickable {
            cursor: pointer;
        }

        #board-back .sub-clock {
            background: #e8eaf6;
            border-color: #3f51b5;
        }

        /* ピンボタン */
        .pin-btn {
            position: absolute;
            width: min(20px, 3.3vw);
            height: min(20px, 3.3vw);
            border-radius: 50%;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%);
            user-select: none;
            -webkit-user-select: none;
        }

        .pin-btn.up {
            background: #ffa94d;
            outline: 2px solid #f08c00;
        }

        .pin-btn.down {
            background: #868e96;
            outline: 2px solid #495057;
        }

        .arc-indicator {
            position: absolute;
            width: min(76px, 13vw);
            height: min(76px, 13vw);
            pointer-events: none;
            z-index: 15;
            transform: translate(-50%, -50%);
        }

        .arc-path {
            fill: none;
            stroke: #ff6b2b;
            stroke-width: 6;
            stroke-linecap: round;
        }

        /* y2 ↔ x2 切り替え用のトグルスイッチUIエリア */
        .toggle-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
        }

        /* モード変更用の軸アイコンSVG */
        .axis-icon {
            width: 44px;
            height: 44px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .axis-icon.inactive {
            opacity: 0.3;
        }

        /* スイッチの土台 */
        .switch-base {
            position: relative;
            width: 60px;
            height: 30px;
            background-color: #ced4da;
            border: 2px solid #adb5bd;
            border-radius: 20px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        /* スイッチの動く黒い丸ノブ */
        .switch-knob {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background-color: #212529;
            border-radius: 50%;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* x2状態の時のノブの移動位置 */
        .switch-base.x2-active .switch-knob {
            transform: translateX(30px);
        }

        /* 解法コントロールのスタイル */
        .solution-controls {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 5px;
            margin-bottom: 5px;
        }

        /* 解法テキスト表示エリアのスタイル */
        .solution-container {
            background: #f8f9fa;
            border: 1px dashed #adb5bd;
            border-radius: 10px;
            padding: 12px;
            margin-top: 20px;
            margin-bottom: 20px;
            font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-size: 13px;
            line-height: 1.6;
            text-align: left;
            color: #495057;
            overflow-x: auto;
        }

        .move-header {
            display: flex;
            align-items: center;
            white-space: nowrap;
            padding: 2px 4px 6px 4px;
            margin-bottom: 6px;
            border-bottom: 1px solid #dee2e6;
            font-weight: bold;
            color: #868e96;
            user-select: none;
        }

        .move-header .part-pins {
            color: #ff922b;
        }

        .move-header .part-left {
            color: #f06595;
        }

        .move-header .part-right {
            color: #339af0;
        }

        .move-header .move-slash {
            color: #adb5bd;
            font-weight: normal;
        }

        .solution-container .move-item {
            display: flex;
            align-items: center;
            white-space: nowrap;
            margin-right: 0;
            padding: 1px 4px;
            border-radius: 4px;
        }

        .solution-container .move-item.current {
            background-color: #e7f5ff;
            text-decoration: none;
        }

        .move-num {
            display: inline-block;
            width: 3ch;
            text-align: right;
            margin-right: 0.8ch;
            flex-shrink: 0;
            user-select: none;
            color: #868e96;
        }

        .solution-container .move-item.current .move-num {
            color: #1971c2;
            font-weight: bold;
        }

        .move-part.part-pins {
            display: inline-block;
            width: 13ch;
            flex-shrink: 0;
        }

        .move-part.part-left {
            display: inline-block;
            width: 9ch;
            flex-shrink: 0;
        }

        .move-part.part-right {
            display: inline-block;
            flex-shrink: 0;
        }

        .move-part.part-flip {
            font-weight: bold;
            color: #7950f2;
        }

        .move-slash {
            display: inline-block;
            width: 2ch;
            text-align: center;
            color: #adb5bd;
            flex-shrink: 0;
            font-weight: normal;
        }

        /* 解法用のピン強調輪郭と時計矢印のスタイル */
        .pin-highlight-ring {
            position: absolute;
            width: min(32px, 5.3vw);
            height: min(32px, 5.3vw);
            border-radius: 50% !important;
            pointer-events: none;
            z-index: 12;
            transform: translate(-50%, -50%);
        }

        /* 新しく「上げる」ピンの輪郭 */
        .pin-highlight-ring.ring-up {
            border: 3px solid #ff922b;
        }

        /* 新しく「下げる」ピンの輪郭 */
        .pin-highlight-ring.ring-down {
            border: 3px dashed #193450;
        }

        .solve-method-selector {
            margin: 15px 0 10px 0;
            text-align: center;
        }

        .solve-method-selector select {
            padding: 6px 12px;
            font-size: 14px;
            border-radius: 6px;
            border: 1px solid #ced4da;
            background-color: white;
            cursor: pointer;
            outline: none;
            font-family: inherit;
        }

        .solve-method-selector select:hover {
            border-color: #aeb5bc;
        }

        .solve-arrow-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 14;
        }

        .solve-arrow-line {
            stroke: #fa5252;
            stroke-width: 2;
            stroke-linecap: round;
            opacity: 0.8;
        }

        #solve-arrow-head path {
            fill: #fa5252;
            opacity: 0.8;
        }

        /* 針の回転アニメーション用スタイル */
        .sub-clock line {
            transform-origin: 50px 50px;
            transition: transform 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        /* トレーニング・タイマー周りのスタイル */
        .training-bar {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0 10px 0;
        }

        .training-toggle-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .switch-base.training-active {
            background-color: #55beb9;
            border-color: #32adb3;
        }

        .switch-base.training-active .switch-knob {
            transform: translateX(30px);
            background-color: #ffffff;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.3);
        }

        .timer-display {
            font-size: 46px;
            /* 【変更】monospaceのみだったものを統一 */
            font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            font-weight: 500;
            color: #000;
            width: 140px;
            text-align: center;
            letter-spacing: 1px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .btn-primary {
            background-color: #228be6;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 0;
            width: 100px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(34, 139, 230, 0.25);
            transition: background-color 0.1s;
        }

        .btn-primary:active {
            background-color: #1c7ed6;
        }

        .btn-primary.btn-end {
            background-color: #fa5252;
            box-shadow: 0 4px 12px rgba(250, 82, 82, 0.25);
        }

        .btn-primary.btn-end:active {
            background-color: #e03131;
        }

        .bottom-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 25px;
            margin-bottom: 15px;
        }

        /* 整理されたインラインスタイル */
        h2 {
            text-align: center;
        }

        #scramble-controls-area {
            display: none;
            margin-bottom: 20px;
        }

        #scramble-controls-area.show {
            display: block;
        }

        .timer-label {
            font-size: 12px;
            font-weight: bold;
            color: #868e96;
            margin-top: 6px;
        }

        .toggle-container.no-margin {
            margin: 0;
        }

        .solve-method-label {
            font-size: 14px;
            color: #495057;
            font-weight: bold;
        }

        .mn-values-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 46px;
            font-weight: 900;
            color: #000;
            font-family: inherit;
        }

        .mn-value-item {
            cursor: pointer;
            padding: 0 4px;
            border-bottom: 5px solid transparent;
        }

        #mn-formula-display {
            font-family: "JetBrains Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
            height: 28px;
            font-size: 22px;
            font-weight: bold;
            color: #000;
            text-align: center;
            margin-top: 0px;
            margin-bottom: 10px;
        }

        #mn-display-area {
            display: none;
            margin: 0;
            padding: 0;
        }

        #mn-display-area.show {
            display: block;
        }

        .debug-m-label {
            color: #6741d9;
        }

        .solve-mn-label {
            position: absolute;
            transform: translate(-50%, -8%);
            font-weight: 900;
            font-size: 11cqw;
            font-family: "Noto Sans JP", sans-serif;
            text-shadow: 2px 2px 0 #fff, -2px -2px 0 #fff, 2px -2px 0 #fff, -2px 2px 0 #fff, 0px 3px 5px rgba(0, 0, 0, 0.4);
            pointer-events: none;
            z-index: 25;
        }
    </style>
</head>

<body>
    <div id="app">
        <h2>7-Simul 盤面シミュレータ</h2>

        <!-- スクランブル表示と右下のトグルボタンをラップする -->
        <div class="scramble-wrapper">
            <div id="scramble-text" class="scramble-container">ここにスクランブルが表示されます</div>
            <button id="toggle-scramble-btn" class="toggle-scramble-btn-inline"
                onclick="toggleScrambleControls()">▼</button>
        </div>

        <!-- 折りたたまれるスリムなボタン領域 -->
        <div id="scramble-controls-area">
            <div class="scramble-controls">
                <button class="btn-ctrl slim-btn" onclick="moveFirst()">|◀</button>
                <button class="btn-ctrl slim-btn" onclick="movePrev()">◀</button>
                <button class="btn-ctrl slim-btn" onclick="moveNext()">▶</button>
                <button class="btn-ctrl slim-btn" onclick="moveLast()">▶|</button>
            </div>
        </div>

        <div class="clock-wrapper">
            <div class="board-container">
                <div class="board-title">表 (Front)</div>
                <div id="board-front" class="clock-board"></div>
            </div>
            <div class="board-container">
                <div class="board-title">裏 (Back)</div>
                <div id="board-back" class="clock-board"></div>
            </div>
        </div>

        <div class="training-bar">
            <div class="training-toggle-wrapper">
                <div id="training-switch" class="switch-base" onclick="toggleTrainingMode()">
                    <div class="switch-knob"></div>
                </div>
                <div class="timer-label">Timer</div>
            </div>
            <div id="timer-display" class="timer-display">--.--</div>
            <button id="primary-action-btn" class="btn-primary" onclick="handlePrimaryAction()">Scramble</button>
        </div>


        <div id="mn-display-area"></div>

        <div class="toggle-container no-margin">
            <svg id="icon-y2" class="axis-icon" viewBox="0 0 60 60" onclick="setFlipMode('y2')">
                <circle cx="30" cy="30" r="18" fill="none" stroke="#000" stroke-width="3" />
                <line x1="30" y1="5" x2="30" y2="12" stroke="#000" stroke-width="3" stroke-linecap="round" />
                <line x1="30" y1="48" x2="30" y2="55" stroke="#000" stroke-width="3" stroke-linecap="round" />
                <text x="30" y="36" font-size="18" font-weight="bold" font-family="sans-serif"
                    text-anchor="middle">y2</text>
            </svg>

            <div id="toggle-switch" class="switch-base" onclick="toggleFlipModeSwitch()">
                <div class="switch-knob"></div>
            </div>

            <svg id="icon-x2" class="axis-icon inactive" viewBox="0 0 60 60" onclick="setFlipMode('x2')">
                <circle cx="30" cy="30" r="18" fill="none" stroke="#000" stroke-width="3" />
                <line x1="5" y1="30" x2="12" y2="30" stroke="#000" stroke-width="3" stroke-linecap="round" />
                <line x1="48" y1="30" x2="55" y2="30" stroke="#000" stroke-width="3" stroke-linecap="round" />
                <text x="30" y="36" font-size="18" font-weight="bold" font-family="sans-serif"
                    text-anchor="middle">x2</text>
            </svg>
        </div>

        <div class="solve-method-selector">
            <label for="solve-method" class="solve-method-label">解法: </label>
            <select id="solve-method" onchange="changeSolveMethod(this.value)">
                <option value="flip">Flip</option>
                <option value="10mm">10MM (10 Moves Memoless)</option>
                <option value="7sfndmw6lm">7sfndmw6lm</option>
                <option value="bpaul">bpaul</option>
                <option value="bpaul_x2">bpaul(x2)</option>
                <option value="bpaul_x2_mirror">bpaul(x2)(mirror)</option>
                <option value="tommy">Tommy</option>
            </select>
        </div>

        <div class="solution-controls">
            <button class="btn-ctrl" onclick="solveFirst()">|◀</button>
            <button class="btn-ctrl" onclick="solvePrev()">◀</button>
            <button class="btn-ctrl" onclick="solveNext()">▶</button>
            <button class="btn-ctrl" onclick="solveLast()">▶|</button>
        </div>
        <div class="solution-container"></div>
    </div>

    <script>
        const SOLVE_METHODS = {
            'flip': {
                mode: 'y2',
                moves: [
                    "DR/-/DR:C->U", "UL/UL:C->R/-", "UR/-/UR:C->L", "UL,UR/UL:C->D/-", "UL,UR,DR/-/UR:C->12",
                    "y2",
                    "DR/-/DR:C->U", "UL/UL:C->R/-", "UR/-/UR:C->L", "UL,UR/UL:C->D/-", "UL,UR,DR/-/UR:C->DL",
                    "UL,UR,DL/UL:C->DR/-", "UR,DR,DL/-/UR:C->UL", "UL,DR,DL/UL:C->UR/-", "UL,UR,DR,DL/-/UR:C->12"
                ]
            },
            '10mm': {
                mode: 'x2',
                moves: [
                    "DR/UL:UL->L/DR:C->U", "UL/UL:C->R/-", "UR/-/UR:C->L", "UL,UR/UL:C->D/-",
                    "x2",
                    "DR/UL:UL->L/DR:C->U", "UL/UL:C->R/DR:DR->D", "UR/-/UR:C->L", "UL,UR/UL:C->D/-", "UL,UR,DR/-/UR:UR->DL",
                    "UL,DR/UL:C->12/UR:UR->12"
                ]
            },
            '7sfndmw6lm': {
                mode: 'x2',
                formulas: {
                    'M1': 'R->D+l->ul', 'M2': 'u->c', 'M3': 'l->u',
                    'M4': 'r->d+L->UL', 'M5': 'U->C', 'M6': 'L->U'
                },
                moves: [
                    "UL,DR,DL/UL:M1/UR:M2", "UL,DL/UL:D->R/UR:M3", "UL/UL:C->R/UR:DR->R",
                    "x2",
                    "UL,DR,DL/UL:M4/UR:M5", "UL,DL/UL:D->R/UR:M6", "UL/UL:C->R/UR:DR->R",
                    "UL,DR/UL:C->12/UR:UR->12"
                ]
            },
            'bpaul': {
                mode: 'y2',
                formulas: {
                    'M1': 'L->U+l->ul',
                    'M2': 'u->c',
                    'M3': 'l->u',
                    'M4': 'R->D+r->dr',
                    'M5': 'd->c'
                },
                moves: [
                    "UL,UR,DR/DL:M2/UR:M1",
                    "UR,DR/UL:M3/UR:U->L",
                    "DR/UL:UL->U/DR:C->U",
                    "UL,DL,DR/UL:M4/UR:M5",
                    "UL,DL/UL:D->R/-",
                    "UL,DL/-/UR:UR->DL",
                    "UL/UL:C->R/UR:DR->R",
                    "UL,DR/UL:C->12/UR:UR->12"
                ]
            },
            'bpaul_x2': {
                mode: 'x2',
                formulas: {
                    'M1': 'L->U+r->dr',
                    'M2': 'd->c',
                    'M3': 'r->d',
                    'M4': 'u->c',
                    'M5': 'l->ul+R->D'
                },
                moves: [
                    "UL,UR,DR/DL:M2/UR:M1",
                    "UR,DR/UL:M3/UR:U->L",
                    "DR/UL:UL->U/DR:C->U",
                    "UL,DL,DR/UL:M5/UR:M4",
                    "UL,DL/UL:D->R/-",
                    "UL,DL/-/UR:UR->DL",
                    "UL/UL:C->R/UR:DR->R",
                    "UL,DR/UL:C->12/UR:UR->12"
                ]
            },
            'bpaul_x2_mirror': {
                mode: 'x2',
                formulas: {
                    'M1': 'R->U+l->dl',
                    'M2': 'd->c',
                    'M3': 'l->d',
                    'M4': 'u->c',
                    'M5': 'r->ur+L->D'
                },
                moves: [
                    "UR,UL,DL/UL:M1/DR:M2",
                    "UL,DL/UL:U->R/UR:M3",
                    "DL/DL:C->U/UR:UR->U",
                    "UR,DR,DL/UL:M4/UR:M5",
                    "UR,DR/-/UR:D->L",
                    "UR,DR/UL:UL->DR/-",
                    "UR/UL:DL->L/UR:C->L",
                    "UR,DL/UL:UL->12/UR:C->12"
                ]
            },
            'tommy': {
                mode: 'x2',
                formulas: {
                    'M1': 'd->c',
                    'M2': 'r->dr+L->U',
                    'M3': 'U->L',
                    'M4': 'r->d',
                    'M5': 'U->UR+D->C+ul->l+r',
                    'M6': 'c->u+d+L->UL+R->DR',
                },
                moves: [
                    "UL,UR,DR/DL:M1/UR:M2",
                    "UR,DR/UL:M4/UR:M3",
                    "DR/UL:UL->U/DR:C->U",
                    "UL,DR/UL:M5/UR:M6",
                    "UL/UL:C->D/UR:DL->D",
                    "UL,DL/UL:C->R/UR:DR->R",
                    "UL,DL,DR/UL:C->12/UR:UR->12"
                ]
            },
        };

        // --- グローバル定数 ---
        // x2モードの時の位置ローテーションマップ（5箇所で重複していたものを統合）
        const X2_ROTATE = { 'UL': 'DR', 'UR': 'DL', 'DL': 'UR', 'DR': 'UL', 'U': 'D', 'D': 'U', 'L': 'R', 'R': 'L', 'C': 'C' };
        // 裏面ピンの表面への対応マップ（2箇所で重複していたものを統合）
        const BACK_PIN_MAP = { 'UL': 'UR', 'UR': 'UL', 'DL': 'DR', 'DR': 'DL' };

        let savedMethod = localStorage.getItem('savedSolveMethod');
        if (!savedMethod || !SOLVE_METHODS[savedMethod]) {
            savedMethod = 'flip';
        }
        const state = {
            clocks: {},
            flipMode: 'y2',
            pins: { UL: false, UR: false, DL: false, DR: false },
            scrambleMoves: [],
            currentMoveIndex: -1,
            currentSolveIndex: -1,
            currentSolveFace: 'F',
            solveAmounts: [],
            solveMoves: [],
            mValues: {},
            mFormulas: {},
            currentMethod: savedMethod,
            isTrainingMode: false,  // 【追加】
            isTimerRunning: false   // 【追加】
        };
        // 配列の初期化も、保存された解法をベースに行う
        state.solveMoves = SOLVE_METHODS[state.currentMethod].moves;
        state.solveAmounts = new Array(state.solveMoves.length).fill(null).map(() => ({ left: 0, right: 0 }));

        // --- 共通ユーティリティ関数 ---

        // 指定インデックスまでのsolve手順での「現在の面」と「最後のフリップモード」を計算する
        // updateCurrentSolveFace() と getCurrentFlipType() の重複ロジックを統合
        function getSolveFaceAndFlipAtIndex(index) {
            let face = 'F', lastFlip = 'y2';
            for (let i = 0; i <= index; i++) {
                const m = state.solveMoves[i];
                if (m === 'y2' || m === 'x2') {
                    face = face === 'F' ? 'B' : 'F';
                    lastFlip = m;
                }
            }
            return { face, lastFlip };
        }

        // ピン状態を面に応じて state.pins に適用する（2箇所で重複していたロジックを統合）
        function applyPinsToState(upPinNames, face) {
            if (face === 'F') {
                Object.keys(state.pins).forEach(p => { state.pins[p] = upPinNames.includes(p); });
            } else {
                Object.keys(state.pins).forEach(p => state.pins[p] = true);
                upPinNames.forEach(backPin => {
                    const frontPin = BACK_PIN_MAP[backPin];
                    if (frontPin) state.pins[frontPin] = false;
                });
            }
        }

        // 左手・右手の操作情報リストを生成する（3箇所で重複していた構築コードを統合）
        function buildOpInfoList(leftOpStr, rightOpStr) {
            return [
                { type: 'left', op: leftOpStr, label: '左手', color: COLORS.leftHand },
                { type: 'right', op: rightOpStr, label: '右手', color: COLORS.rightHand }
            ];
        }

        // デバッグ表示を「未開始」状態にリセットする（4箇所で重複していた設定を統合）
        function setDebugToIdle() {
            const debugEl = document.getElementById('solve-debug');
            if (debugEl) {
                debugEl.innerHTML = 'DEBUG: [未開始] Face: F, X(Amount): -, Y(Pins): -, Z(Dial): -, F(Flip): -'
                    + getMValuesDebugString();
            }
        }

        function initDataState() {
            state.visualAngles = {};
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    state.clocks[`F${x}${y}`] = 0;
                    state.clocks[`B${x}${y}`] = 0;
                    state.visualAngles[`F${x}${y}`] = 0;
                    state.visualAngles[`B${x}${y}`] = 0;
                }
            }
        }

        const FRONT_PINS = [
            { name: 'UL', left: '36%', top: '36%' },
            { name: 'UR', left: '64%', top: '36%' },
            { name: 'DL', left: '36%', top: '64%' },
            { name: 'DR', left: '64%', top: '64%' },
        ];
        const BACK_PINS_Y2 = [
            { name: 'UR', left: '36%', top: '36%' },
            { name: 'UL', left: '64%', top: '36%' },
            { name: 'DR', left: '36%', top: '64%' },
            { name: 'DL', left: '64%', top: '64%' },
        ];
        const BACK_PINS_X2 = [
            { name: 'DL', left: '36%', top: '36%' },
            { name: 'DR', left: '64%', top: '36%' },
            { name: 'UL', left: '36%', top: '64%' },
            { name: 'UR', left: '64%', top: '64%' },
        ];

        // Wrap the common createClockSVG from clock-utils.js
        function createClockSVG(id, isFront) {
            return ClockUtils.createClockSVG(id, {
                isFront: isFront,
                className: 'sub-clock',
                isCornerClickable: false
            });
        }

        // Wrap the common renderTicks from clock-utils.js
        function renderTicks(id, isFlipped) {
            const g = document.getElementById(`ticks-${id}`);
            ClockUtils.renderTicks(g, isFlipped);
        }

        function initBoards() {
            // 【追加】ドロップダウンの表示を、保存された解法に合わせる
            const methodSelect = document.getElementById('solve-method');
            if (methodSelect) {
                methodSelect.value = state.currentMethod;
            }

            initDataState();

            // 【修正】単純な buildDOMBoards() ではなく、初期解法のモード(x2/y2)を適用する
            setFlipMode(SOLVE_METHODS[state.currentMethod].mode);

            generateScrambleText();
            renderSolutionHTML();
        }

        function buildDOMBoards() {
            const frontBoard = document.getElementById('board-front');
            const backBoard = document.getElementById('board-back');
            frontBoard.innerHTML = '';
            backBoard.innerHTML = '';

            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 3; x++) {
                    frontBoard.appendChild(createClockSVG(`F${x}${y}`, true));
                }
            }
            FRONT_PINS.forEach(({ name, left, top }) => {
                const pin = document.createElement('div');
                const isUp = state.pins[name];
                pin.className = `pin-btn ${isUp ? 'up' : 'down'}`;
                pin.id = `pin-front-${name}`;
                pin.style.left = left;
                pin.style.top = top;
                pin.onclick = () => togglePin(name);
                frontBoard.appendChild(pin);
            });

            const backPinLayout = state.flipMode === 'x2' ? BACK_PINS_X2 : BACK_PINS_Y2;
            for (let y = 0; y < 3; y++) {
                for (let x = 0; x < 3; x++) {
                    let targetX = x;
                    let targetY = y;
                    if (state.flipMode === 'x2') {
                        targetX = 2 - x;
                        targetY = 2 - y;
                    }
                    backBoard.appendChild(createClockSVG(`B${targetX}${targetY}`, false));
                }
            }
            backPinLayout.forEach(({ name, left, top }) => {
                const pin = document.createElement('div');
                const isUpOnBack = !state.pins[name];
                pin.className = `pin-btn ${isUpOnBack ? 'up' : 'down'}`;
                pin.id = `pin-back-${name}`;
                pin.style.left = left;
                pin.style.top = top;
                pin.onclick = () => togglePin(name);
                backBoard.appendChild(pin);
            });
        }

        function updateClockDisplay(id, hour, isBackAndX2, instant = false, isForward = true) {
            const hand = document.getElementById(`hand-${id}`);
            const dot = document.getElementById(`dot-${id}`);
            if (!hand || !dot) return;

            let displayHour = hour;
            if (isBackAndX2) {
                displayHour = (hour + 6) % 12;
                dot.setAttribute('cy', '88');
            } else {
                dot.setAttribute('cy', '12');
            }

            if (state.visualAngles === undefined) {
                state.visualAngles = {};
            }
            if (state.visualAngles[id] === undefined) {
                state.visualAngles[id] = displayHour * 30;
            }

            // Custom logic for the 180 degrees spin direction
            const customDiffCalculator = (currentAngle, targetHour) => {
                const targetAngleBase = targetHour * 30;
                let diff = (targetAngleBase - currentAngle) % 360;
                if (diff < -180) diff += 360;
                if (diff > 180) diff -= 360;

                if (Math.abs(diff) === 180) {
                    const isFrontFace = id[0] === 'F';
                    const isBeforeY2 = state.currentMoveIndex <= 8;
                    let desiredDirection = isBeforeY2
                        ? (isFrontFace ? 1 : -1)
                        : (isFrontFace ? -1 : 1);

                    if (!isForward) {
                        desiredDirection = -desiredDirection;
                    }
                    diff = desiredDirection * 180;
                }
                return diff;
            };

            // Delegate to the shared updateHandAngle
            ClockUtils.updateHandAngle(hand, state.visualAngles, id, displayHour, instant, customDiffCalculator);

            renderTicks(id, isBackAndX2);
        }

        function renderAllDisplays(instant = false, isForward = true) {
            const isX2 = state.flipMode === 'x2';
            const frontBoard = document.getElementById('board-front');
            const backBoard = document.getElementById('board-back');

            if (instant) {
                if (frontBoard) frontBoard.classList.add('no-transition');
                if (backBoard) backBoard.classList.add('no-transition');
            }

            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    updateClockDisplay(`F${x}${y}`, state.clocks[`F${x}${y}`], false, instant, isForward);
                    updateClockDisplay(`B${x}${y}`, state.clocks[`B${x}${y}`], isX2, instant, isForward);
                }
            }
            renderPins();

            if (instant) {
                if (frontBoard) frontBoard.offsetHeight;
                if (backBoard) backBoard.offsetHeight;
                if (frontBoard) frontBoard.classList.remove('no-transition');
                if (backBoard) backBoard.classList.remove('no-transition');
            }
        }

        function togglePin(pinName) {
            state.pins[pinName] = !state.pins[pinName];
            renderPins();
        }

        function renderPins() {
            FRONT_PINS.forEach(({ name }) => {
                const el = document.getElementById('pin-front-' + name);
                if (!el) return;
                const isUp = state.pins[name];
                el.className = `pin-btn ${isUp ? 'up' : 'down'}`;
            });
            const backPinLayout = state.flipMode === 'x2' ? BACK_PINS_X2 : BACK_PINS_Y2;
            backPinLayout.forEach(({ name }) => {
                const el = document.getElementById('pin-back-' + name);
                if (!el) return;
                const isUpOnBack = !state.pins[name];
                el.className = `pin-btn ${isUpOnBack ? 'up' : 'down'}`;
            });
        }
        function drawArcIndicators(axisData) {
            document.querySelectorAll('.arc-indicator').forEach(el => el.remove());
            if (!axisData) return;

            const drawArc = (clockId, color) => {
                if (!clockId) return;
                const face = clockId[0];
                let cx = clockId[1];
                let cy = clockId[2];

                if (face === 'B' && state.flipMode === 'x2') {
                    cx = cx === '0' ? '2' : '0';
                    cy = cy === '0' ? '2' : '0';
                }

                const posX = cx === '0' ? '18%' : '82%';
                const posY = cy === '0' ? '18%' : '82%';

                const board = document.getElementById(face === 'F' ? 'board-front' : 'board-back');
                if (!board) return;

                const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                svg.setAttribute("class", "arc-indicator");
                svg.style.left = posX;
                svg.style.top = posY;
                svg.setAttribute("viewBox", "0 0 100 100");

                let pathData = "";
                if (cx === '0' && cy === '0') pathData = "M 15 50 A 35 35 0 0 1 50 15";
                else if (cx === '2' && cy === '0') pathData = "M 50 15 A 35 35 0 0 1 85 50";
                else if (cx === '0' && cy === '2') pathData = "M 50 85 A 35 35 0 0 1 15 50";
                else if (cx === '2' && cy === '2') pathData = "M 85 50 A 35 35 0 0 1 50 85";

                // 引数で指定された色で円弧を描画
                svg.innerHTML = `<path class="arc-path" d="${pathData}" style="stroke: ${color} !important;" />`;
                board.appendChild(svg);
            };

            // 配列の場合はスクランブル時のデフォルト色（オレンジ）、オブジェクトなら左右で色分け
            if (Array.isArray(axisData)) {
                axisData.forEach(id => drawArc(id, '#ff922b'));
            } else {
                drawArc(axisData.left, COLORS.leftHand);
                drawArc(axisData.right, COLORS.rightHand);
            }
        }

        function updateArcDisplayForCurrentIndex() {
            const index = state.currentMoveIndex;

            if (index < 0 || index >= state.scrambleMoves.length) {
                drawArcIndicators([]);
                return;
            }

            const move = state.scrambleMoves[index];
            if (move === 'y2') {
                drawArcIndicators([]);
                return;
            }

            const match = move.match(/^([A-Z]+)/);
            if (!match) return;
            const op = match[1];

            let arcs = [];
            if (index <= 8) {
                const frontArcs = {
                    'UR': ['F20'], 'DR': ['F22'], 'DL': ['F02'], 'UL': ['F00'],
                    'U': ['F00', 'F20'],
                    'R': ['F20', 'F22'],
                    'D': ['F02', 'F22'],
                    'L': ['F00', 'F02'],
                    'ALL': ['F00', 'F20', 'F02', 'F22']
                };
                arcs = frontArcs[op] || [];
            } else {
                const backArcs = {
                    'U': ['B20', 'B00'],
                    'R': ['B20', 'B22'],
                    'D': ['B22', 'B02'],
                    'L': ['B00', 'B02'],
                    'ALL': ['B20', 'B00', 'B22', 'B02']
                };
                arcs = backArcs[op] || [];
            }
            drawArcIndicators(arcs);
        }
        function setFlipMode(mode) {
            state.flipMode = mode;

            const toggleSwitch = document.getElementById('toggle-switch');
            if (mode === 'x2') {
                toggleSwitch.classList.add('x2-active');
                document.getElementById('icon-x2').classList.remove('inactive');
                document.getElementById('icon-y2').classList.add('inactive');
            } else {
                toggleSwitch.classList.remove('x2-active');
                document.getElementById('icon-y2').classList.remove('inactive');
                document.getElementById('icon-x2').classList.add('inactive');
            }

            buildDOMBoards();
            renderAllDisplays(true);

            // スクランブル進行中のダイヤル円弧を再描画
            updateArcDisplayForCurrentIndex();
            // （setFlipMode 内の後半部分）
            if (state.currentSolveIndex >= 0) {
                const move = state.solveMoves[state.currentSolveIndex];
                if (move === 'y2' || move === 'x2') {
                    applySolveMoveAt(state.currentSolveIndex, true);
                } else {
                    const mainParts = move.split('/');
                    if (mainParts.length >= 3) {
                        const pinStr = mainParts[0];
                        const opInfoList = buildOpInfoList(mainParts[1], mainParts[2]);

                        drawSolveVisuals(pinStr, opInfoList);

                        const face = state.currentSolveFace;
                        const lastFlip = getCurrentFlipType();
                        const isX2Step = (face === 'B' && lastFlip === 'x2');
                        const x2Rotate = { 'UL': 'DR', 'UR': 'DL', 'DL': 'UR', 'DR': 'UL' };

                        const dialMap = { 'UL': `${face}00`, 'UR': `${face}20`, 'DL': `${face}02`, 'DR': `${face}22` };

                        const axisIds = { left: null, right: null };
                        opInfoList.forEach(info => {
                            if (info.op === '-') return;
                            let dialStr = info.op.split(':')[0];
                            if (isX2Step) dialStr = x2Rotate[dialStr] || dialStr;
                            if (dialMap[dialStr]) axisIds[info.type] = dialMap[dialStr];
                        });
                        drawArcIndicators(axisIds);
                    }
                }
            }
        }

        function toggleFlipModeSwitch() {
            const nextMode = state.flipMode === 'y2' ? 'x2' : 'y2';
            setFlipMode(nextMode);
        }


        function rotateEngine(id, amount) {
            const pinOfAxis = {
                'F00': 'UL', 'B20': 'UL',
                'F20': 'UR', 'B00': 'UR',
                'F02': 'DL', 'B22': 'DL',
                'F22': 'DR', 'B02': 'DR'
            };

            const F_links = {
                'UL': ['F00', 'F10', 'F01', 'F11'],
                'UR': ['F20', 'F10', 'F21', 'F11'],
                'DL': ['F02', 'F12', 'F01', 'F11'],
                'DR': ['F22', 'F12', 'F21', 'F11']
            };
            const B_links = {
                'UL': ['B20', 'B10', 'B21', 'B11'],
                'UR': ['B00', 'B10', 'B01', 'B11'],
                'DL': ['B22', 'B12', 'B21', 'B11'],
                'DR': ['B02', 'B12', 'B01', 'B11']
            };

            const oppositeCorner = {
                'F00': 'B20', 'F20': 'B00', 'F02': 'B22', 'F22': 'B02',
                'B20': 'F00', 'B00': 'F20', 'B22': 'F02', 'B02': 'F22'
            };

            let deltas = {};
            for (let x = 0; x < 3; x++) {
                for (let y = 0; y < 3; y++) {
                    deltas[`F${x}${y}`] = 0; deltas[`B${x}${y}`] = 0;
                }
            }

            const targetPin = pinOfAxis[id];
            const isBaseFront = state.pins[targetPin] === true;

            let baseDelta = isBaseFront ? ((id[0] === 'F') ? amount : (12 - amount) % 12) : ((id[0] === 'B') ? amount : (12 - amount) % 12);

            if (isBaseFront) {
                Object.keys(F_links).forEach(pin => {
                    if (state.pins[pin] === true) {
                        F_links[pin].forEach(clockId => { deltas[clockId] = baseDelta; });
                    }
                });
            } else {
                Object.keys(B_links).forEach(pin => {
                    if (state.pins[pin] === false) {
                        B_links[pin].forEach(clockId => { deltas[clockId] = baseDelta; });
                    }
                });
            }

            const cornersToCheck = isBaseFront ? ['F00', 'F20', 'F02', 'F22'] : ['B00', 'B20', 'B02', 'B22'];
            cornersToCheck.forEach(cId => {
                if (deltas[cId] > 0) {
                    const oppId = oppositeCorner[cId];
                    deltas[oppId] = (12 - deltas[cId]) % 12;
                }
            });

            for (let cKey in deltas) {
                state.clocks[cKey] = (state.clocks[cKey] + deltas[cKey]) % 12;
            }
        }

        function getRandomAmount() {
            const val = Math.floor(Math.random() * 12) - 5;
            if (val >= 0) return `${val}+`;
            return `${Math.abs(val)}-`;
        }

        function generateScrambleText() {
            const frontOps = ['UR', 'DR', 'DL', 'UL', 'U', 'R', 'D', 'L', 'ALL'];
            const backOps = ['U', 'R', 'D', 'L', 'ALL'];

            let moves = [];
            frontOps.forEach(op => { moves.push(`${op}${getRandomAmount()}`); });
            moves.push('y2');
            backOps.forEach(op => { moves.push(`${op}${getRandomAmount()}`); });

            state.scrambleMoves = moves;
            resetSolveProgressState();
            state.solveAmounts.fill(0);
            moveFirst(true);
            moveLast(false);
            renderSolutionHTML();
            updateSolveButtonsState();
            analyzeMethodCalculations();
        }
        function toggleScrambleControls() {
            const area = document.getElementById('scramble-controls-area');
            const btn = document.getElementById('toggle-scramble-btn');

            if (area.classList.contains('show')) {
                area.classList.remove('show');
                btn.innerText = '▼';
            } else {
                area.classList.add('show');
                btn.innerText = '▲';
            }
        }

        function toggleTrainingMode() {
            if (state.isTimerRunning) return;
            state.isTrainingMode = !state.isTrainingMode;

            const sw = document.getElementById('training-switch');
            const btn = document.getElementById('primary-action-btn');
            const timer = document.getElementById('timer-display');

            if (state.isTrainingMode) {
                sw.classList.add('training-active');
                btn.innerText = 'START';
                timer.innerText = '--.--';
            } else {
                sw.classList.remove('training-active');
                btn.innerText = 'Scramble';
                timer.innerText = '';
            }
        }

        function handlePrimaryAction() {
            if (!state.isTrainingMode) {
                // 通常モード
                generateScrambleText();
            } else {
                // トレーニングモード
                if (!state.isTimerRunning) {
                    generateScrambleText();
                    state.isTimerRunning = true;
                    document.getElementById('primary-action-btn').innerText = 'END';
                    document.getElementById('primary-action-btn').classList.add('btn-end');
                    startTime = Date.now();
                    timerInterval = setInterval(updateTimer, 10);
                    renderMnDisplay();
                } else {
                    state.isTimerRunning = false;
                    clearInterval(timerInterval);
                    document.getElementById('primary-action-btn').innerText = 'START';
                    document.getElementById('primary-action-btn').classList.remove('btn-end');
                    renderMnDisplay();
                }
            }
        }

        function updateTimer() {
            const elapsed = Date.now() - startTime;
            const secs = Math.floor(elapsed / 1000);
            const centis = Math.floor((elapsed % 1000) / 10);
            document.getElementById('timer-display').innerText =
                String(secs).padStart(2, '0') + '.' + String(centis).padStart(2, '0');
        }

        function renderScrambleHTML() {
            const container = document.getElementById('scramble-text');
            if (!container) return;
            container.innerHTML = '';

            state.scrambleMoves.forEach((move, index) => {
                const span = document.createElement('span');
                span.className = 'move-item';
                span.innerText = move;

                if (index < state.currentMoveIndex) span.classList.add('done');
                else if (index === state.currentMoveIndex) span.classList.add('current');
                else span.classList.add('pending');
                container.appendChild(span);
            });
        }

        function updateSolveButtonsState() {
            const isScrambleFinished = (state.currentMoveIndex === state.scrambleMoves.length);
            const solveButtons = document.querySelectorAll('.solution-controls .btn-ctrl');

            solveButtons.forEach(btn => {
                if (isScrambleFinished) {
                    btn.disabled = false;
                    btn.style.opacity = '1';
                    btn.style.cursor = 'pointer';
                } else {
                    btn.disabled = true;
                    btn.style.opacity = '0.4';
                    btn.style.cursor = 'not-allowed';
                }
            });
        }

        function applyMoveAt(index, isForward) {
            if (index < 0 || index >= state.scrambleMoves.length) return;
            const move = state.scrambleMoves[index];

            if (move === 'y2') {
                drawArcIndicators([]);
                Object.keys(state.pins).forEach(p => state.pins[p] = true);
                return;
            }

            const match = move.match(/^([A-Z]+)(\d+)([\+\-])/);
            if (!match) return;

            const op = match[1];
            let amount = parseInt(match[2]);
            const sign = match[3];

            let opRules = {};
            if (index <= 8) {
                opRules = {
                    'UR': { pins: { UL: false, UR: true, DL: false, DR: false }, axis: 'F20' },
                    'DR': { pins: { UL: false, UR: false, DL: false, DR: true }, axis: 'F22' },
                    'DL': { pins: { UL: false, UR: false, DL: true, DR: false }, axis: 'F02' },
                    'UL': { pins: { UL: true, UR: false, DL: false, DR: false }, axis: 'F00' },
                    'U': { pins: { UL: true, UR: true, DL: false, DR: false }, axis: 'F00' },
                    'R': { pins: { UL: false, UR: true, DL: false, DR: true }, axis: 'F20' },
                    'D': { pins: { UL: false, UR: false, DL: true, DR: true }, axis: 'F02' },
                    'L': { pins: { UL: true, UR: false, DL: true, DR: false }, axis: 'F00' },
                    'ALL': { pins: { UL: true, UR: true, DL: true, DR: true }, axis: 'F00' }
                };
            } else {
                opRules = {
                    'U': { pins: { UL: false, UR: false, DL: true, DR: true }, axis: 'B20' },
                    'R': { pins: { UL: false, UR: true, DL: false, DR: true }, axis: 'B20' },
                    'D': { pins: { UL: true, UR: true, DL: false, DR: false }, axis: 'B22' },
                    'L': { pins: { UL: true, UR: false, DL: true, DR: false }, axis: 'B00' },
                    'ALL': { pins: { UL: false, UR: false, DL: false, DR: false }, axis: 'B20' }
                };
            }

            if (!opRules[op]) return;

            const rule = opRules[op];
            Object.keys(state.pins).forEach(p => { state.pins[p] = rule.pins[p]; });

            if (sign === '-') amount = (12 - amount) % 12;
            if (!isForward) amount = (12 - amount) % 12;

            rotateEngine(rule.axis, amount);
        }

        function restorePinsForCurrentIndex() {
            if (state.currentMoveIndex >= 0 && state.currentMoveIndex < state.scrambleMoves.length) {
                const curMove = state.scrambleMoves[state.currentMoveIndex];
                if (curMove === 'y2') {
                    drawArcIndicators([]);
                    return;
                }
                const match = curMove.match(/^([A-Z]+)/);
                if (match) {
                    const op = match[1];
                    if (state.currentMoveIndex <= 8) {
                        const frontRules = {
                            'UR': { UL: false, UR: true, DL: false, DR: false },
                            'DR': { UL: false, UR: false, DL: false, DR: true },
                            'DL': { UL: false, UR: false, DL: true, DR: false },
                            'UL': { UL: true, UR: false, DL: false, DR: false },
                            'U': { UL: true, UR: true, DL: false, DR: false },
                            'D': { UL: false, UR: false, DL: true, DR: true },
                            'L': { UL: true, UR: false, DL: true, DR: false },
                            'R': { UL: false, UR: true, DL: false, DR: true },
                            'ALL': { UL: true, UR: true, DL: true, DR: true }
                        };
                        if (frontRules[op]) {
                            Object.keys(state.pins).forEach(p => state.pins[p] = frontRules[op][p]);
                            return;
                        }
                    } else {
                        const backRules = {
                            'U': { UL: false, UR: false, DL: true, DR: true },
                            'R': { UL: false, UR: true, DL: false, DR: true },
                            'D': { UL: true, UR: true, DL: false, DR: false },
                            'L': { UL: true, UR: false, DL: true, DR: false },
                            'ALL': { UL: false, UR: false, DL: false, DR: false }
                        };
                        if (backRules[op]) {
                            Object.keys(state.pins).forEach(p => state.pins[p] = backRules[op][p]);
                            return;
                        }
                    }
                }
            }
            Object.keys(state.pins).forEach(p => state.pins[p] = false);
        }

        function moveFirst(instant = false) {
            resetSolveProgressState();
            if (instant) {
                initDataState();
            } else {
                for (let x = 0; x < 3; x++) {
                    for (let y = 0; y < 3; y++) {
                        state.clocks[`F${x}${y}`] = 0;
                        state.clocks[`B${x}${y}`] = 0;
                    }
                }
            }
            Object.keys(state.pins).forEach(p => state.pins[p] = false);
            state.currentMoveIndex = -1;
            renderScrambleHTML();
            renderAllDisplays(instant);
            updateArcDisplayForCurrentIndex();
            updateSolveButtonsState();
        }

        function movePrev() {
            if (state.currentSolveIndex >= 0) {
                moveLast();
            }
            resetSolveProgressState();
            if (state.currentMoveIndex >= 0) {
                applyMoveAt(state.currentMoveIndex, false);
                state.currentMoveIndex--;
                restorePinsForCurrentIndex();
                renderScrambleHTML();
                renderAllDisplays(false, false);
                updateArcDisplayForCurrentIndex();
            }
            updateSolveButtonsState();
        }

        function moveNext() {
            resetSolveProgressState();
            if (state.currentMoveIndex < state.scrambleMoves.length) {
                state.currentMoveIndex++;
                applyMoveAt(state.currentMoveIndex, true);
                renderScrambleHTML();
                renderAllDisplays(false, true);
                updateArcDisplayForCurrentIndex();
            }
            updateSolveButtonsState();
        }

        function moveLast(instant = false) {
            if (state.currentSolveIndex >= 0) {
                moveFirst();
                resetSolveProgressState();
            }
            while (state.currentMoveIndex < state.scrambleMoves.length) {
                state.currentMoveIndex++;
                applyMoveAt(state.currentMoveIndex, true);
            }
            restorePinsForCurrentIndex();
            renderScrambleHTML();
            renderAllDisplays(instant);
            updateArcDisplayForCurrentIndex();
            updateSolveButtonsState();
        }

        function renderSolutionHTML() {
            const container = document.querySelector('.solution-container');
            if (!container) return;
            container.innerHTML = '';

            // ヘッダー行 (pin / left / right) の描画
            const header = document.createElement('div');

            const headerNum = document.createElement('span');

            header.appendChild(headerNum);

            const headerPin = document.createElement('span');

            headerSlash1.className = 'move-slash';
            headerSlash1.innerText = '/';
            header.appendChild(headerSlash1);

            const headerLeft = document.createElement('span');
            headerLeft.className = 'move-part part-left';
            headerLeft.innerText = 'Left';
            header.appendChild(headerLeft);

            const headerSlash2 = document.createElement('span');
            headerSlash2.className = 'move-slash';
            headerSlash2.innerText = '/';
            header.appendChild(headerSlash2);

            const headerRight = document.createElement('span');
            headerRight.className = 'move-part part-right';

                else if (index === state.currentSolveIndex)

                else
                    item.classList.add('pending');

                const numSpan = document.createElement('span');
                numSpan.className = 'move-num';
                numSpan.innerText = `${index + 1}.`;
                item.appendChild(numSpan);

                const parts = move.split('/');
                if (parts.length === 1) {

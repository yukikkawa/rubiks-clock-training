<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルービッククロック 計算練習</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="common.css">
    <script src="clock-utils.js"></script>
    <style>
        body {
            background-color: #f8f9fa;
        }
        #app {
            max-width: 400px;
        }
        .screen { display: none; }
        .active { display: block; }
        
        /* 時計エリア */
        .clock-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 4px;
            background: #f1f3f5;
            padding: 12px 6px;
            border-radius: 14px;
            margin: 15px 0;
        }
        /* 上級モード用のレイアウト */
        .advanced-clock-layout {
            display: none;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 12px;
            background: #f1f3f5;
            padding: 12px 6px;
            border-radius: 14px;
            margin: 15px 0;
        }
        .clock-pair {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .plus-sign {
            font-size: 24px;
            font-weight: bold;
            color: #0288d1;
            margin-bottom: 5px;
        }
        .arrow-box {
            width: 50px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-svg {
            width: 100%;
            height: 100%;
            fill: #0288d1;
        }
        .arrow-v-svg {
            width: 30px;
            height: 30px;
            fill: #0288d1;
            transform: rotate(90deg);
        }
        .clock-svg {
            background: #e1f5fe;
            border-radius: 50%;
            border: 3px solid #0288d1;
            flex: 0 0 110px;
            height: 110px;
        }
        .clock-svg-small {
            flex: 0 0 85px;
            height: 85px;
        }
        
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .btn-answer {
            color: white;
            font-size: 20px;
            font-weight: 700;
            padding: 14px 0;
            border-radius: 10px;
        }
        
        .btn-minus { background-color: #c92a2a; }
        .btn-plus { background-color: #228be6; }
        .btn-fullwidth {
            grid-column: span 2;
            background-color: #12b886;
        }
        
        .info-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: #495057;
            font-weight: bold;
            padding: 0 4px;
        }
        .live-timer {
            font-family: "JetBrains Mono", monospace;
            background: #e2f5e5;
            color: #2b8a3e;
            padding: 4px 12px;
            border-radius: 6px;
        }
        .btn-pause {
            background-color: #e9ecef;
            color: #495057;
            font-size: 12px;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 6px;
        }
        
        /* リザルト表示 */
        .result-total {
            font-family: "JetBrains Mono", monospace;
            font-size: 32px;
            font-weight: bold;
            color: #d6336c;
            margin: 15px 0 2px 0;
        }
        .stats-block {
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            transition: background-color 0.2s;
        }
        .result-formula {
            font-size: 14px;
            color: #868e96;
            margin-bottom: 20px;
        }
        .result-best {
            font-size: 15px;
            color: #495057;
        }
        .result-best span {
            font-weight: bold;
            color: #495057;
        }
        .new-record-badge {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #ffd43b 0%, #fab005 100%);
            color: #862e00;
            font-size: 18px;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 999px;
            margin: 0 auto 12px auto;
            width: fit-content;
            box-shadow: 0 4px 12px rgba(250, 176, 5, 0.35);
            animation: record-pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .new-record-badge.show {
            display: flex;
        }
        @keyframes record-pop {
            0% { transform: scale(0.6); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .start-best {
            font-size: 15px;
            font-weight: bold;
            color: #495057;
        }
        /* エフェクト用オーバーレイ共通 */
        .effect-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s ease-out;
        }
        .effect-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ○（正解）エフェクト */
        .correct-circle {
            width: 140px;
            height: 140px;
            border: 16px solid #2b8a3e;
            border-radius: 50%;
            transform: scale(0.6);
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #correct-overlay.show .correct-circle { transform: scale(1); }

        /* ✕（不正解）エフェクト */
        .incorrect-cross {
            position: relative;
            width: 120px;
            height: 120px;
            transform: scale(0.6);
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .incorrect-cross::before, .incorrect-cross::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 16px;
            background-color: #f03e3e;
            border-radius: 8px;
        }
        .incorrect-cross::before { transform: translateY(-50%) rotate(45deg); }
        .incorrect-cross::after { transform: translateY(-50%) rotate(-45deg); }
        #incorrect-overlay.show .incorrect-cross { transform: scale(1); }

        /* カウントダウン演出 */
        #countdown-overlay {
            background: rgba(255, 255, 255, 0.4);
        }
        #countdown-overlay.is-start {
            background: none;
            pointer-events: none;
        }
        #countdown-display {
            font-family: "JetBrains Mono", monospace;
            font-size: 100px;
            font-weight: 900;
            color: #2b8a3e;
            text-shadow: none;
            transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }
        #countdown-overlay.is-start #countdown-display {
            text-shadow: 0 0 15px rgba(255,255,255,0.9), 0 0 30px rgba(255,255,255,0.9);
        }

        /* カスタム確認モーダル */
        #confirm-modal {
            z-index: 100;
            background: rgba(0, 0, 0, 0.5);
        }
        .modal-content {
            background: white;
            padding: 24px;
            border-radius: 20px;
            width: 85%;
            max-width: 320px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
        }
        .modal-content p {
            color: #212529;
            font-size: 16px;
            font-weight: bold;
            margin: 0 0 24px 0;
            line-height: 1.5;
        }
        .modal-buttons {
            display: flex;
            gap: 12px;
        }
        .btn-modal {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: bold;
        }
        .btn-confirm { background-color: #f03e3e; color: white; }
        .btn-cancel { background-color: #e9ecef; color: #495057; }

        #pause-overlay {
            background: #f8f9fa;
            z-index: 25;
            flex-direction: column;
        }

        /* 針の回転アニメーション用スタイル */
        .clock-svg line {
            transition: transform 0.15s cubic-bezier(0.2, 0, 0, 1);
        }

        /* 整理されたインラインスタイル */
        .pause-overlay-content {
            text-align: center;
        }

        .pause-title {
            margin-bottom: 10px;
        }

        .pause-stats {
            margin-bottom: 20px;
            color: #495057;
            font-size: 15px;
            line-height: 1.6;
        }

        .highlight-blue {
            font-weight: bold;
            color: #228be6;
        }

        .highlight-red {
            font-weight: bold;
            color: #f03e3e;
        }

        .btn-pause-resume {
            width: auto;
        }

        .btn-back-to-title {
            display: block;
            margin: 20px auto 0 auto;
        }

        /* 既存の start-best クラスにインライン分をマージ、または上書き */
        .start-best, .result-best {
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .start-best.has-history, .result-best.has-history {
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .start-stats-detail, .result-stats-detail {
            font-size: 15px;
            color: #868e96;
        }

        .stats-recent {
            margin-top: 10px;
            font-size: 12px;
            color: #adb5bd;
        }

        .stats-recent-val {
            color: #adb5bd;
            font-weight: bold;
        }

        .difficulty-desc {
            font-size: 12px;
            color: #868e96;
            margin-top: -10px;
            margin-bottom: 15px;
            min-height: 1.5em;
        }

        .result-difficulty {
            font-size: 14px;
            color: #868e96;
            margin-bottom: 5px;
        }

        .result-comparison {
            font-size: 15px;
            margin-bottom: 15px;
            min-height: 1.5em;
            color: #495057;
            font-weight: bold;
        }

        .difficulty-bests-list {
            margin-top: 10px;
            font-size: 13px;
            color: #adb5bd;
            display: flex;
            justify-content: space-around;
            width: 100%;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="correct-overlay" class="effect-overlay">
        <div class="correct-circle"></div>
    </div>

    <div id="confirm-modal" class="effect-overlay">
        <div class="modal-content">
            <p id="confirm-message">メッセージ</p>
            <div class="modal-buttons">
                <button class="btn-modal btn-cancel" onclick="closeConfirmModal()">キャンセル</button>
                <button class="btn-modal btn-confirm" onclick="executeConfirmAction()">はい</button>
            </div>
        </div>
    </div>

    <div id="incorrect-overlay" class="effect-overlay">
        <div class="incorrect-cross"></div>
    </div>

    <div id="countdown-overlay" class="effect-overlay">
        <div id="countdown-display"></div>
    </div>

    <div id="pause-overlay" class="effect-overlay">
        <div class="pause-overlay-content">
            <h2 class="pause-title">一時停止中</h2>
            <div class="pause-stats">
                <div>現在の進捗: <span id="pause-current-step" class="highlight-blue">--</span> / 10 問目</div>
                <div>これまでのミス: <span id="pause-miss-count" class="highlight-red">--</span> 回</div>
            </div>
            <button class="btn-start btn-pause-resume" onclick="togglePause()">再開する</button>
            <button class="btn-reset btn-back-to-title" onclick="backToTitle()">タイトルに戻る</button>
        </div>
    </div>

    <div id="start-screen" class="screen active">
        <h2>Clock Calc Trainer</h2>
        <p>クロックの針を合わせる<br>ダイヤル回転数を答えてください。</p>

        <div id="start-stats-container" class="stats-block" style="display: none;">
            <div id="start-best" class="start-best" style="display: none;">ベストタイム: <span id="start-best-time">--</span> 秒</div>
            <div id="start-stats" class="start-stats-detail" style="display: none;">
                <div>直近5回の平均: <span id="start-avg" class="highlight-blue">--</span> 秒</div>
                <div class="stats-recent">直近5回の記録: <span id="start-recent" class="stats-recent-val"></span></div>
            </div>
        </div>
        
        <div class="difficulty-container">
            <button class="btn-difficulty active" data-level="beginner" onclick="selectDifficulty('beginner')">初級</button>
            <button class="btn-difficulty" data-level="intermediate" onclick="selectDifficulty('intermediate')">中級</button>
            <button class="btn-difficulty" data-level="advanced" onclick="selectDifficulty('advanced')">上級</button>
        </div>
        <div id="start-difficulty-desc" class="difficulty-desc"></div>
        <button class="btn-start" onclick="startQuiz()">START</button>
        <button class="btn-reset" onclick="confirmReset()">記録をリセットする</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="info-container">
            <div>問 <span id="current-question">1</span> / 10</div>
            <button class="btn-pause" onclick="togglePause()">一時停止</button>
            <div class="live-timer"><span id="live-time">0.00</span> 秒</div>
        </div>
        
        <div id="standard-clock-area" class="clock-container">
            <div id="standard-left-container"></div>
            <div class="arrow-box"><svg class="arrow-svg" viewBox="0 0 24 24"><path id="arrow-path" d="M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z"/></svg></div>
            <div id="standard-right-container"></div>
        </div>

        <div id="advanced-clock-area" class="advanced-clock-layout">
            <div class="clock-pair">
                <div id="advanced-a-container"></div>
                <svg class="arrow-v-svg" viewBox="0 0 24 24"><path id="arrow-v1-path" d="M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z"/></svg>
                <div id="advanced-b-container"></div>
            </div>
            <div class="plus-sign">+</div>
            <div class="clock-pair">
                <div id="advanced-c-container"></div>
                <svg class="arrow-v-svg" viewBox="0 0 24 24"><path id="arrow-v2-path" d="M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z"/></svg>
                <div id="advanced-d-container"></div>
            </div>
        </div>

        <div class="btn-grid" id="button-container"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2>リザルト</h2>
        <div id="new-record-badge" class="new-record-badge">🎉 新記録！</div>
        <div class="result-total"><span id="total-time">0.00</span>秒</div>
        <div class="result-formula">
            = <span id="base-time">0.00</span>秒 +（ミス<span id="total-miss">0</span>回×2秒）
        </div>
        <div id="result-difficulty" class="result-difficulty">難易度: <span id="result-diff-label">--</span></div>
        <div id="result-comparison" class="result-comparison"></div>

        <div id="result-stats-container" class="stats-block">
            <div id="result-best" class="result-best">ベストタイム: <span id="best-time">--</span> 秒</div>
            <div id="result-stats" class="result-stats-detail">
                <div>直近5回の平均: <span id="result-avg" class="highlight-blue">--</span> 秒</div>
                <div class="stats-recent">直近6回の記録: <span id="result-recent" class="stats-recent-val"></span></div>
            </div>
        </div>

        <div class="difficulty-container">
            <button class="btn-difficulty active" data-level="beginner" onclick="selectDifficulty('beginner')">初級</button>
            <button class="btn-difficulty" data-level="intermediate" onclick="selectDifficulty('intermediate')">中級</button>
            <button class="btn-difficulty" data-level="advanced" onclick="selectDifficulty('advanced')">上級</button>
        </div>
        <div id="result-difficulty-desc" class="difficulty-desc"></div>
        <div id="difficulty-bests-list" class="difficulty-bests-list"></div>

        <button class="btn-start" onclick="startQuiz()">もう一度挑戦</button>
        <button class="btn-reset" onclick="confirmReset()">記録をリセットする</button>
    </div>
</div>

<script>
    let currentStep = 0;
    let startTime = 0;
    let totalPenaltyTime = 0; 
    let effectStartTime = 0;  
    let pauseStartTime = 0;
    let leftTime = 0;
    let rightTime = 0;
    let correctAnswer = 0;
    let isRunning = false;
    let isPaused = false;
    let isTransitioning = false;
    let pendingConfirmAction = null;
    const difficultyDescs = {
        'beginner': '矢印の向きが左から右に固定されます。',
        'intermediate': '矢印の向きがランダムに変わります。',
        'advanced': '[A→B] + [C→D] の合計を計算します。上下の差分を足しましょう！'
    };

    let playedDifficulty = 'beginner'; 
    let selectedDifficulty = 'beginner'; // beginner, intermediate, advanced
    let missCount = 0; // ミス回数の記録用

    let handAngles = {
        'hand-left': 0,
        'hand-right': 0,
        'hand-a': 0,
        'hand-b': 0,
        'hand-c': 0,
        'hand-d': 0
    };

    // Dynamically insert the clock SVGs
    function initClockSVGs() {
        document.getElementById('standard-left-container').appendChild(ClockUtils.createClockSVG('left', { className: 'clock-svg', handId: 'hand-left' }));
        document.getElementById('standard-right-container').appendChild(ClockUtils.createClockSVG('right', { className: 'clock-svg', handId: 'hand-right' }));
        
        document.getElementById('advanced-a-container').appendChild(ClockUtils.createClockSVG('a', { className: 'clock-svg clock-svg-small', handId: 'hand-a' }));
        document.getElementById('advanced-b-container').appendChild(ClockUtils.createClockSVG('b', { className: 'clock-svg clock-svg-small', handId: 'hand-b' }));
        document.getElementById('advanced-c-container').appendChild(ClockUtils.createClockSVG('c', { className: 'clock-svg clock-svg-small', handId: 'hand-c' }));
        document.getElementById('advanced-d-container').appendChild(ClockUtils.createClockSVG('d', { className: 'clock-svg clock-svg-small', handId: 'hand-d' }));
    }

    function updateHandAngle(id, targetHour, instant = false) {
        const hand = document.getElementById(id);
        if (!hand) return;
        // Delegate hand rotation logic to ClockUtils
        ClockUtils.updateHandAngle(hand, handAngles, id, targetHour, instant);
    }

    const BEST_TIME_BASE_KEY = 'clock-training-best-time';
    const HISTORY_BASE_KEY = 'clock-training-history';
    const MISS_PENALTY_SEC = 2;

    const btnContainer = document.getElementById('button-container');
    const arrowPath = document.getElementById('arrow-path');
    const correctOverlay = document.getElementById('correct-overlay');
    const incorrectOverlay = document.getElementById('incorrect-overlay');

    function getDifficultyLabel(diff = selectedDifficulty) {
        const labels = { 'beginner': '初級', 'intermediate': '中級', 'advanced': '上級' };
        return labels[diff] || '';
    }

    function getBestTimeKey(diff) {
        const d = diff || selectedDifficulty;
        return `${BEST_TIME_BASE_KEY}-${d}`;
    }

    function getHistoryKey(diff) {
        const d = diff || selectedDifficulty;
        return `${HISTORY_BASE_KEY}-${d}`;
    }

    function selectDifficulty(level) {
        selectedDifficulty = level;
        // UIの選択状態を更新
        document.querySelectorAll('.btn-difficulty').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('data-level') === level);
        });

        // 説明文の更新
        const desc = difficultyDescs[level];
        const startDescEl = document.getElementById('start-difficulty-desc');
        const resultDescEl = document.getElementById('result-difficulty-desc');
        if (startDescEl) startDescEl.innerText = desc;
        if (resultDescEl) resultDescEl.innerText = desc;

        // 記録エリアの背景色を更新
        const statsBgColors = {
            'beginner': '#e7f5ff',     // 薄い青
            'intermediate': '#fff9db', // 薄い黄
            'advanced': '#fff5f5'      // 薄い赤
        };
        const bg = statsBgColors[level];
        ['start-stats-container', 'result-stats-container'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.backgroundColor = bg;
        });

        // 開始画面の表示を更新
        updateBestTimeDisplay();
        updateStatsDisplay();
    }

    const buttonLayout = [
        [0, true],
        [-1, false], [1, false],
        [-2, false], [2, false],
        [-3, false], [3, false],
        [-4, false], [4, false],
        [-5, false], [5, false],
        [6, true]
    ];

    buttonLayout.forEach(([num, isFull]) => {
        const btn = document.createElement('button');
        btn.className = 'btn-answer';
        
        if (isFull) {
            btn.classList.add('btn-fullwidth');
            btn.innerText = num;
        } else {
            if (num < 0) {
                btn.classList.add('btn-minus');
                btn.innerText = num;
            } else {
                btn.classList.add('btn-plus');
                btn.innerText = `+${num}`;
            }
        }
        
        btn.onclick = () => checkAnswer(num);
        btnContainer.appendChild(btn);
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function saveBestTime(time) {
        localStorage.setItem(getBestTimeKey(), time.toFixed(2));
    }

    function updateBestTimeDisplay() {
        // 開始画面の更新 (選択中の難易度を表示)
        const startBest = getBestTime(selectedDifficulty);
        
        const startBestEl = document.getElementById('start-best');
        const startContainer = document.getElementById('start-stats-container');
        if (startBest === null) {
            startBestEl.style.display = 'none';
        } else {
            document.getElementById('start-best-time').innerText = startBest.toFixed(2);
            startBestEl.style.display = 'block';
        }

        // ベスト記録か履歴のどちらかがあればコンテナを表示
        if (startContainer) startContainer.style.display = (startBest !== null || getHistory(selectedDifficulty).length > 0) ? 'block' : 'none';

        // リザルト画面のベストタイムは、実際にプレイした難易度のものを保持する
        const resultBest = getBestTime(playedDifficulty);
        if (resultBest === null) {
            document.getElementById('best-time').innerText = "--";
        } else {
            document.getElementById('best-time').innerText = resultBest.toFixed(2);
        }
    }

    function updateStartScreenDisplay() {
        updateBestTimeDisplay();
        updateStatsDisplay();
    }

    function updateDifficultyBestsList() {
        const levels = ['beginner', 'intermediate', 'advanced'];
        const container = document.getElementById('difficulty-bests-list');
        if (!container) return;
        container.innerHTML = levels.map(l => {
            const best = getBestTime(l);
            const label = getDifficultyLabel(l);
            return `<div>${label}: ${best ? best.toFixed(2) : '--'}s</div>`;
        }).join('');
    }

    function getBestTime(diff) {
        const stored = localStorage.getItem(getBestTimeKey(diff));
        return stored !== null ? parseFloat(stored) : null;
    }

    function getHistory(diff) {
        const stored = localStorage.getItem(getHistoryKey(diff));
        return stored ? JSON.parse(stored).map(Number) : [];
    }

    function saveToHistory(time) {
        const history = getHistory(selectedDifficulty);
        history.push(parseFloat(time.toFixed(2)));
        if (history.length > 50) history.shift(); // 履歴は最大50件保持
        localStorage.setItem(getHistoryKey(selectedDifficulty), JSON.stringify(history));
    }

    function updateScreenStats(prefix, diff, listCount, avgCount) {
        const history = getHistory(diff);
        const container = document.getElementById(`${prefix}-stats`);
        const wrapper = document.getElementById(`${prefix}-stats-container`);
        if (!container || !wrapper) return;

        const hasBest = getBestTime(diff) !== null;
        
        if (history.length === 0) {
            container.style.display = 'none';
            return;
        }

        wrapper.style.display = 'block';
        
        const listItems = history.slice(-listCount).reverse();
        const avgItems = history.slice(-avgCount);
        
        const avg = avgItems.length > 0 
            ? (avgItems.reduce((a, b) => a + b, 0) / avgItems.length).toFixed(2)
            : "--";
        const listStr = listItems.length > 0 ? listItems.map(n => n.toFixed(2)).join(', ') : 'なし';

        // ベスト記録が表示されている場合のみ区切り線を調整
        const bestEl = document.getElementById(`${prefix}-best`);
        if (bestEl) {
            if (history.length > 0 && bestEl.style.display !== 'none') {
                bestEl.classList.add('has-history');
            } else {
                bestEl.classList.remove('has-history');
            }
        }

        container.style.display = 'block';
        document.getElementById(`${prefix}-avg`).innerText = avg;
        document.getElementById(`${prefix}-recent`).innerText = listStr;
    }

    function updateStatsDisplay() {
        // 開始画面は選択中の難易度を表示
        updateScreenStats('start', selectedDifficulty, 5, 5);
        // リザルト画面は最後にプレイした難易度を表示（必要に応じて呼ぶ）
        updateScreenStats('result', playedDifficulty, 6, 5);
    }

    function showConfirmModal(message, action) {
        document.getElementById('confirm-message').innerText = message;
        pendingConfirmAction = action;
        document.getElementById('confirm-modal').classList.add('show');
    }

    function closeConfirmModal() {
        document.getElementById('confirm-modal').classList.remove('show');
        pendingConfirmAction = null;
    }

    function executeConfirmAction() {
        if (pendingConfirmAction) pendingConfirmAction();
        closeConfirmModal();
    }

    function confirmReset() {
        const label = getDifficultyLabel(selectedDifficulty);
        showConfirmModal(`${label}の記録をリセットしますか？`, () => {
            localStorage.removeItem(getBestTimeKey());
            localStorage.removeItem(getHistoryKey());
            updateBestTimeDisplay();
            updateStatsDisplay();
            updateStartScreenDisplay();
            updateDifficultyBestsList();
        });
    }

    function startQuiz() {
        // 初期化
        playedDifficulty = selectedDifficulty;
        currentStep = 0;
        totalPenaltyTime = 0;
        missCount = 0;
        isPaused = false;
        isTransitioning = true; // カウントダウン中の操作防止

        // カウントダウン開始前に、選択された難易度に応じたレイアウトを表示
        const standardArea = document.getElementById('standard-clock-area');
        const advancedArea = document.getElementById('advanced-clock-area');
        if (playedDifficulty === 'advanced') {
            standardArea.style.display = 'none';
            advancedArea.style.display = 'flex';
        } else {
            standardArea.style.display = 'flex';
            advancedArea.style.display = 'none';
        }

        // カウントダウン中は針と矢印を隠す
        const elementsToHide = ['hand-left', 'hand-right', 'hand-a', 'hand-b', 'hand-c', 'hand-d', 'arrow-path', 'arrow-v1-path', 'arrow-v2-path'];
        elementsToHide.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.visibility = 'hidden';
        });

        // クイズ画面へ切り替え（カウントダウンを見せるため）
        showScreen('quiz-screen');
        document.getElementById('live-time').innerText = "0.00";
        
        // カウントダウン開始
        runCountdown(() => {
            startTime = performance.now();
            isRunning = true;
            isTransitioning = false;

            // プレイ開始時に針と矢印を表示
            const elementsToShow = ['hand-left', 'hand-right', 'hand-a', 'hand-b', 'hand-c', 'hand-d', 'arrow-path', 'arrow-v1-path', 'arrow-v2-path'];
            elementsToShow.forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.visibility = 'visible';
            });

            nextQuestion(true);
            updateTimer();
        });
    }

    function runCountdown(callback) {
        const overlay = document.getElementById('countdown-overlay');
        const display = document.getElementById('countdown-display');
        let count = 3;

        overlay.classList.remove('is-start');
        overlay.classList.add('show');
        display.innerText = count;

        const timer = setInterval(() => {
            count--;
            if (count > 0) {
                display.innerText = count;
                display.style.transform = 'scale(1.2)';
                setTimeout(() => { if(count > 0) display.style.transform = 'scale(1)'; }, 100);
            } else if (count === 0) {
                overlay.classList.add('is-start');
                display.innerText = "START!";
                display.style.transform = 'scale(1.3)';
                
                clearInterval(timer);
                // STARTが表示された瞬間にゲーム開始（操作可能にする）
                callback();
                
                // START!の表示時間を0.25秒(250ms)にして終了する
                setTimeout(() => {
                    overlay.classList.remove('show');
                    display.style.transform = 'scale(1)';
                }, 250);
            }
        }, 800); // カウントダウンの間隔は0.8秒
    }

    function togglePause() {
        // エフェクト中やカウントダウン中はポーズ不可
        if (isTransitioning) return;
        if (!isRunning && !isPaused) return;

        const now = performance.now();
        const overlay = document.getElementById('pause-overlay');

        if (!isPaused) {
            // 一時停止
            isPaused = true;
            pauseStartTime = now;
            isRunning = false; // タイマー更新を止める

            // 進捗の表示更新
            document.getElementById('pause-current-step').innerText = currentStep;
            document.getElementById('pause-miss-count').innerText = missCount;

            overlay.classList.add('show');
        } else {
            // 再開
            const pauseDuration = performance.now() - pauseStartTime;
            totalPenaltyTime += pauseDuration; // 止まっていた時間をペナルティとして加算（実質的に相殺）
            isPaused = false;
            isRunning = true;
            overlay.classList.remove('show');
            updateTimer(); // ループ再開
        }
    }

    function backToTitle() {
        showConfirmModal("計測を止めてタイトルに戻ります。よろしいですか？", () => {
            isRunning = false;
            isPaused = false;
            isTransitioning = false;
            document.getElementById('pause-overlay').classList.remove('show');
            showScreen('start-screen');
        });
    }

    function getBaseElapsedSec(now = performance.now()) {
        const calcNow = isPaused ? pauseStartTime : now;
        const baseMs = isTransitioning
            ? effectStartTime - startTime - totalPenaltyTime
            : calcNow - startTime - totalPenaltyTime;
        return baseMs / 1000;
    }

    // ミスペナルティ込みのタイム
    function getResultTimeSec(now = performance.now()) {
        return getBaseElapsedSec(now) + missCount * MISS_PENALTY_SEC;
    }

    function updateTimer() {
        if (!isRunning) return;

        document.getElementById('live-time').innerText = getResultTimeSec().toFixed(2);
        requestAnimationFrame(updateTimer);
    }

    function nextQuestion(instant = false) {
        currentStep++;
        if (currentStep > 10) {
            endQuiz();
            return;
        }
        document.getElementById('current-question').innerText = currentStep;

        const standardArea = document.getElementById('standard-clock-area');
        const advancedArea = document.getElementById('advanced-clock-area');

        if (instant) {
            standardArea.classList.add('no-transition');
            advancedArea.classList.add('no-transition');
        }

        if (playedDifficulty === 'advanced') {
            standardArea.style.display = 'none';
            advancedArea.style.display = 'flex';

            const a = Math.floor(Math.random() * 12);
            const b = Math.floor(Math.random() * 12);
            const c = Math.floor(Math.random() * 12);
            const d = Math.floor(Math.random() * 12);
            const isT1toB1 = Math.random() < 0.5;
            const isT2toB2 = Math.random() < 0.5;
            const v1Path = document.getElementById('arrow-v1-path');
            const v2Path = document.getElementById('arrow-v2-path');

            let diff1, diff2;
            if (isT1toB1) {
                v1Path.setAttribute('d', 'M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z'); // 上向き
                diff1 = b - a;
            } else {
                v1Path.setAttribute('d', 'M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z'); // 下向き
                diff1 = a - b;
            }

            if (isT2toB2) {
                v2Path.setAttribute('d', 'M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z'); // 上向き
                diff2 = d - c;
            } else {
                v2Path.setAttribute('d', 'M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z'); // 下向き
                diff2 = c - d;
            }

            let totalDiff = diff1 + diff2;

            // 時計の最短手数に正規化
            while (totalDiff <= -5) totalDiff += 12;
            while (totalDiff > 6) totalDiff -= 12;
            correctAnswer = totalDiff;

            updateHandAngle('hand-a', a, instant);
            updateHandAngle('hand-b', b, instant);
            updateHandAngle('hand-c', c, instant);
            updateHandAngle('hand-d', d, instant);

        } else {
            standardArea.style.display = 'flex';
            advancedArea.style.display = 'none';

            leftTime = Math.floor(Math.random() * 12);
            rightTime = Math.floor(Math.random() * 12);

            const isLeftToRight = playedDifficulty === 'beginner' ? true : Math.random() < 0.5;

            let fromTime, toTime;
            if (isLeftToRight) {
                arrowPath.setAttribute('d', 'M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z');
                fromTime = leftTime;
                toTime = rightTime;
            } else {
                arrowPath.setAttribute('d', 'M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z');
                fromTime = rightTime;
                toTime = leftTime;
            }

            let diff = toTime - fromTime;
            while (diff <= -5) diff += 12;
            while (diff > 6) diff -= 12;
            correctAnswer = diff;

            updateHandAngle('hand-left', leftTime, instant);
            updateHandAngle('hand-right', rightTime, instant);
        }

        if (instant) {
            standardArea.offsetHeight;
            advancedArea.offsetHeight;
            standardArea.classList.remove('no-transition');
            advancedArea.classList.remove('no-transition');
        }
    }

    function checkAnswer(selected) {
        if (isTransitioning || isPaused) return;

        if (selected === correctAnswer) {
            triggerCorrectEffect();
        } else {
            missCount++;
            triggerIncorrectEffect();
        }
    }

    function triggerCorrectEffect() {
        isTransitioning = true;
        effectStartTime = performance.now(); 
        correctOverlay.classList.add('show');

        setTimeout(() => {
            correctOverlay.classList.remove('show');
            let effectEndTime = performance.now();
            totalPenaltyTime += (effectEndTime - effectStartTime);
            isTransitioning = false;
            nextQuestion();
        }, 250);
    }

    function triggerIncorrectEffect() {
        isTransitioning = true;
        incorrectOverlay.classList.add('show');

        setTimeout(() => {
            incorrectOverlay.classList.remove('show');
            isTransitioning = false;
        }, 250);
    }

    function endQuiz() {
        isRunning = false;
        const baseTimeNum = getBaseElapsedSec(performance.now());
        const resultTimeNum = baseTimeNum + missCount * MISS_PENALTY_SEC;

        const history = getHistory(playedDifficulty);
        const recentForComparison = history.slice(-5);
        let comparisonHTML = "";
        if (recentForComparison.length > 0) {
            const avg = recentForComparison.reduce((a, b) => a + b, 0) / recentForComparison.length;
            const diffValue = resultTimeNum - avg;
            const sign = diffValue > 0 ? "+" : "";
            comparisonHTML = `過去${recentForComparison.length}回の平均から ${sign}${diffValue.toFixed(2)}秒`;
        }
        document.getElementById('result-comparison').innerHTML = comparisonHTML;

        const previousBest = getBestTime(playedDifficulty);
        const isNewRecord = previousBest === null || resultTimeNum < previousBest;

        saveToHistory(resultTimeNum);

        if (isNewRecord) {
            saveBestTime(resultTimeNum);
        }

        document.getElementById('base-time').innerText = baseTimeNum.toFixed(2);
        document.getElementById('total-miss').innerText = missCount;
        document.getElementById('total-time').innerText = resultTimeNum.toFixed(2);
        document.getElementById('result-diff-label').innerText = getDifficultyLabel(playedDifficulty);
        
        const bestNow = getBestTime(playedDifficulty);
        document.getElementById('best-time').innerText = bestNow !== null ? bestNow.toFixed(2) : "--";

        const badge = document.getElementById('new-record-badge');
        badge.classList.toggle('show', isNewRecord);

        updateScreenStats('result', playedDifficulty, 6, 5);
        updateDifficultyBestsList();
        showScreen('result-screen');
    }

    // Initialize clock SVGs
    initClockSVGs();

    selectDifficulty(selectedDifficulty);
    updateDifficultyBestsList();
</script>
</body>
</html>

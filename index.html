<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルービッククロック 練習アプリ</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            background: white;
            padding: 20px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
            width: 100%;
            max-width: 400px;
        }
        .screen { display: none; }
        .active { display: block; }
        
        h2 { margin-top: 10px; color: #212529; }
        p { color: #6c757d; font-size: 14px; line-height: 1.5; }

        /* 時計エリア（接近レイアウトの復元） */
        .clock-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 4px;
            background: #f1f3f5;
            padding: 12px 6px;
            border-radius: 14px;
            margin: 15px 0;
        }
        .arrow-box {
            width: 50px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-svg {
            width: 100%;
            height: 100%;
            fill: #0288d1;
        }
        .clock-svg {
            background: #e1f5fe;
            border-radius: 50%;
            border: 3px solid #0288d1;
            flex: 0 0 110px;
            height: 110px;
        }
        
        /* ボタンのスタイル */
        button {
            font-family: inherit;
            border: none;
            cursor: pointer;
            transition: background 0.1s, transform 0.05s;
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-start {
            background-color: #2b8a3e;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px 32px;
            border-radius: 12px;
            width: 100%;
            margin-top: 15px;
        }
        
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .btn-answer {
            color: white;
            font-size: 20px;
            font-weight: 700;
            padding: 14px 0;
            border-radius: 10px;
        }
        
        /* カラーリングの復元 */
        .btn-minus { background-color: #c92a2a; } /* 落ち着いた赤 */
        .btn-plus { background-color: #228be6; }  /* 鮮やかな青 */
        .btn-fullwidth {
            grid-column: span 2;
            background-color: #12b886; /* 0と6は緑系 */
        }
        
        .info-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: #495057;
            font-weight: bold;
            padding: 0 4px;
        }
        .live-timer {
            font-variant-numeric: tabular-nums;
            background: #e2f5e5;
            color: #2b8a3e;
            padding: 4px 12px;
            border-radius: 6px;
        }
        .result-time {
            font-size: 36px;
            font-weight: bold;
            color: #d6336c;
            margin: 20px 0;
        }

        .message-area {
            height: 20px;
            font-size: 14px;
            font-weight: bold;
            color: #f03e3e;
            margin: 5px 0;
            opacity: 0;
            transition: opacity 0.1s;
        }
        .message-area.show { opacity: 1; }
    </style>
</head>
<body>

<div id="app">
    <div id="start-screen" class="screen active">
        <h2>Clock 差分判定</h2>
        <p>現在位置の時計から目標の時計へ<br>針を合わせる最短手数を答えてください。</p>
        <p>※矢印の向き（出題順）が毎回変わります。</p>
        <button class="btn-start" onclick="startQuiz()">トレーニング開始</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="info-container">
            <div>問 <span id="current-question">1</span> / 10</div>
            <div class="live-timer"><span id="live-time">0.00</span> 秒</div>
        </div>
        
        <div class="clock-container">
            <svg id="clock-left" class="clock-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#0288d1" stroke-width="2"/>
                <circle cx="50" cy="12" r="3" fill="#f03e3e"/>
                <circle cx="68.1" cy="16.9" r="2" fill="#495057"/><circle cx="83.1" cy="31.9" r="2" fill="#495057"/>
                <circle cx="88" cy="50" r="2" fill="#495057"/><circle cx="83.1" cy="68.1" r="2" fill="#495057"/>
                <circle cx="68.1" cy="83.1" r="2" fill="#495057"/><circle cx="50" cy="88" r="2" fill="#495057"/>
                <circle cx="31.9" cy="83.1" r="2" fill="#495057"/><circle cx="16.9" cy="68.1" r="2" fill="#495057"/>
                <circle cx="12" cy="50" r="2" fill="#495057"/><circle cx="16.9" cy="31.9" r="2" fill="#495057"/>
                <circle cx="31.9" cy="16.9" r="2" fill="#495057"/>
                <line id="hand-left" x1="50" y1="50" x2="50" y2="15" stroke="#212529" stroke-width="5" stroke-linecap="round" />
            </svg>

            <div class="arrow-box">
                <svg class="arrow-svg" viewBox="0 0 24 24">
                    <path id="arrow-path" d="M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z"/>
                </svg>
            </div>

            <svg id="clock-right" class="clock-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#0288d1" stroke-width="2"/>
                <circle cx="50" cy="12" r="3" fill="#f03e3e"/>
                <circle cx="68.1" cy="16.9" r="2" fill="#495057"/><circle cx="83.1" cy="31.9" r="2" fill="#495057"/>
                <circle cx="88" cy="50" r="2" fill="#495057"/><circle cx="83.1" cy="68.1" r="2" fill="#495057"/>
                <circle cx="68.1" cy="83.1" r="2" fill="#495057"/><circle cx="50" cy="88" r="2" fill="#495057"/>
                <circle cx="31.9" cy="83.1" r="2" fill="#495057"/><circle cx="16.9" cy="68.1" r="2" fill="#495057"/>
                <circle cx="12" cy="50" r="2" fill="#495057"/><circle cx="16.9" cy="31.9" r="2" fill="#495057"/>
                <circle cx="31.9" cy="16.9" r="2" fill="#495057"/>
                <line id="hand-right" x1="50" y1="50" x2="50" y2="15" stroke="#212529" stroke-width="5" stroke-linecap="round" />
            </svg>
        </div>

        <div id="message-area" class="message-area"></div>

        <div class="btn-grid" id="button-container"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2>リザルト</h2>
        <p>10問正解のタイム:</p>
        <div class="result-time"><span id="total-time">0.00</span> 秒</div>
        <button class="btn-start" onclick="startQuiz()">もう一度挑戦</button>
    </div>
</div>

<script>
    let currentStep = 0;
    let startTime = 0;
    let leftTime = 0;
    let rightTime = 0;
    let correctAnswer = 0;
    let isRunning = false;
    let messageTimeoutId = null;

    const btnContainer = document.getElementById('button-container');
    const msgArea = document.getElementById('message-area');
    const arrowPath = document.getElementById('arrow-path');

    const buttonLayout = [
        [0, true],
        [-1, false], [1, false],
        [-2, false], [2, false],
        [-3, false], [3, false],
        [-4, false], [4, false],
        [-5, false], [5, false],
        [6, true]
    ];

    buttonLayout.forEach(([num, isFull]) => {
        const btn = document.createElement('button');
        btn.className = 'btn-answer';
        
        if (isFull) {
            btn.classList.add('btn-fullwidth');
            btn.innerText = num;
        } else {
            if (num < 0) {
                btn.classList.add('btn-minus');
                btn.innerText = num;
            } else {
                btn.classList.add('btn-plus');
                btn.innerText = `+${num}`;
            }
        }
        
        btn.onclick = () => checkAnswer(num);
        btnContainer.appendChild(btn);
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz() {
        currentStep = 0;
        startTime = performance.now();
        isRunning = true;
        clearMessage();
        nextQuestion();
        showScreen('quiz-screen');
        updateTimer();
    }

    function updateTimer() {
        if (!isRunning) return;
        const now = performance.now();
        const elapsed = ((now - startTime) / 1000).toFixed(2);
        document.getElementById('live-time').innerText = elapsed;
        requestAnimationFrame(updateTimer);
    }

    function nextQuestion() {
        currentStep++;
        if (currentStep > 10) {
            endQuiz();
            return;
        }
        document.getElementById('current-question').innerText = currentStep;

        leftTime = Math.floor(Math.random() * 12);
        rightTime = Math.floor(Math.random() * 12);

        const isLeftToRight = Math.random() < 0.5;

        let fromTime, toTime;
        if (isLeftToRight) {
            arrowPath.setAttribute('d', 'M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z');
            fromTime = leftTime;
            toTime = rightTime;
        } else {
            arrowPath.setAttribute('d', 'M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z');
            fromTime = rightTime;
            toTime = leftTime;
        }

        let diff = toTime - fromTime;
        while (diff <= -5) diff += 12;
        while (diff > 6) diff -= 12;
        correctAnswer = diff;

        document.getElementById('hand-left').setAttribute('transform', `rotate(${leftTime * 30} 50 50)`);
        document.getElementById('hand-right').setAttribute('transform', `rotate(${rightTime * 30} 50 50)`);
    }

    function checkAnswer(selected) {
        if (selected === correctAnswer) {
            clearMessage();
            nextQuestion();
        } else {
            showMessage("× 違います！");
        }
    }

    function showMessage(text) {
        msgArea.innerText = text;
        msgArea.classList.add('show');
        if (messageTimeoutId) clearTimeout(messageTimeoutId);
        messageTimeoutId = setTimeout(() => msgArea.classList.remove('show'), 1000);
    }

    function clearMessage() {
        msgArea.classList.remove('show');
        if (messageTimeoutId) clearTimeout(messageTimeoutId);
    }

    function endQuiz() {
        isRunning = false;
        const endTime = performance.now();
        const totalTime = ((endTime - startTime) / 1000).toFixed(2);
        document.getElementById('total-time').innerText = totalTime;
        showScreen('result-screen');
    }
</script>
</body>
</html>

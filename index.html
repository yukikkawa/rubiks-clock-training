<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ルービッククロック 練習アプリ</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        #app {
            background: white;
            padding: 20px 16px;
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.06);
            text-align: center;
            width: 100%;
            max-width: 400px;
            position: relative;
        }
        .screen { display: none; }
        .active { display: block; }
        
        h2 { margin-top: 10px; color: #212529; }
        p { color: #6c757d; font-size: 14px; line-height: 1.5; }

        /* 時計エリア */
        .clock-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 4px;
            background: #f1f3f5;
            padding: 12px 6px;
            border-radius: 14px;
            margin: 15px 0;
        }
        .arrow-box {
            width: 50px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .arrow-svg {
            width: 100%;
            height: 100%;
            fill: #0288d1;
        }
        .clock-svg {
            background: #e1f5fe;
            border-radius: 50%;
            border: 3px solid #0288d1;
            flex: 0 0 110px;
            height: 110px;
        }
        
        /* ボタンのスタイル */
        button {
            font-family: inherit;
            border: none;
            cursor: pointer;
            transition: background 0.1s, transform 0.05s;
        }
        button:active {
            transform: scale(0.96);
        }
        .btn-start {
            background-color: #2b8a3e;
            color: white;
            font-size: 18px;
            font-weight: bold;
            padding: 14px 32px;
            border-radius: 12px;
            width: 100%;
            margin-top: 15px;
        }
        
        .btn-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        .btn-answer {
            color: white;
            font-size: 20px;
            font-weight: 700;
            padding: 14px 0;
            border-radius: 10px;
        }
        
        .btn-minus { background-color: #c92a2a; }
        .btn-plus { background-color: #228be6; }
        .btn-fullwidth {
            grid-column: span 2;
            background-color: #12b886;
        }
        
        .info-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 15px;
            color: #495057;
            font-weight: bold;
            padding: 0 4px;
        }
        .live-timer {
            font-variant-numeric: tabular-nums;
            background: #e2f5e5;
            color: #2b8a3e;
            padding: 4px 12px;
            border-radius: 6px;
        }
        
        /* リザルト表示 */
        .result-time {
            font-size: 36px;
            font-weight: bold;
            color: #d6336c;
            margin: 15px 0 5px 0;
        }
        .result-miss {
            font-size: 18px;
            font-weight: bold;
            color: #495057;
            margin-bottom: 25px;
        }

        /* エフェクト用オーバーレイ共通 */
        .effect-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.08s ease-out;
        }
        .effect-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ○（正解）エフェクト */
        .correct-circle {
            width: 140px;
            height: 140px;
            border: 16px solid #2b8a3e;
            border-radius: 50%;
            transform: scale(0.6);
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #correct-overlay.show .correct-circle { transform: scale(1); }

        /* ✕（不正解）エフェクト */
        .incorrect-cross {
            position: relative;
            width: 120px;
            height: 120px;
            transform: scale(0.6);
            transition: transform 0.12s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .incorrect-cross::before, .incorrect-cross::after {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 16px;
            background-color: #f03e3e;
            border-radius: 8px;
        }
        .incorrect-cross::before { transform: translateY(-50%) rotate(45deg); }
        .incorrect-cross::after { transform: translateY(-50%) rotate(-45deg); }
        #incorrect-overlay.show .incorrect-cross { transform: scale(1); }
    </style>
</head>
<body>

<div id="app">
    <div id="correct-overlay" class="effect-overlay">
        <div class="correct-circle"></div>
    </div>

    <div id="incorrect-overlay" class="effect-overlay">
        <div class="incorrect-cross"></div>
    </div>

    <div id="start-screen" class="screen active">
        <h2>Clock 差分判定</h2>
        <p>現在位置の時計から目標の時計へ<br>針を合わせる最短手数を答えてください。</p>
        <p>※矢印の向き（出題順）が毎回変わります。</p>
        <button class="btn-start" onclick="startQuiz()">トレーニング開始</button>
    </div>

    <div id="quiz-screen" class="screen">
        <div class="info-container">
            <div>問 <span id="current-question">1</span> / 10</div>
            <div class="live-timer"><span id="live-time">0.00</span> 秒</div>
        </div>
        
        <div class="clock-container">
            <svg id="clock-left" class="clock-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#0288d1" stroke-width="2"/>
                <circle cx="50" cy="12" r="3" fill="#f03e3e"/>
                <circle cx="68.1" cy="16.9" r="2" fill="#495057"/><circle cx="83.1" cy="31.9" r="2" fill="#495057"/>
                <circle cx="88" cy="50" r="2" fill="#495057"/><circle cx="83.1" cy="68.1" r="2" fill="#495057"/>
                <circle cx="68.1" cy="83.1" r="2" fill="#495057"/><circle cx="50" cy="88" r="2" fill="#495057"/>
                <circle cx="31.9" cy="83.1" r="2" fill="#495057"/><circle cx="16.9" cy="68.1" r="2" fill="#495057"/>
                <circle cx="12" cy="50" r="2" fill="#495057"/><circle cx="16.9" cy="31.9" r="2" fill="#495057"/>
                <circle cx="31.9" cy="16.9" r="2" fill="#495057"/>
                <line id="hand-left" x1="50" y1="50" x2="50" y2="15" stroke="#212529" stroke-width="5" stroke-linecap="round" />
            </svg>

            <div class="arrow-box">
                <svg class="arrow-svg" viewBox="0 0 24 24">
                    <path id="arrow-path" d="M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z"/>
                </svg>
            </div>

            <svg id="clock-right" class="clock-svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#0288d1" stroke-width="2"/>
                <circle cx="50" cy="12" r="3" fill="#f03e3e"/>
                <circle cx="68.1" cy="16.9" r="2" fill="#495057"/><circle cx="83.1" cy="31.9" r="2" fill="#495057"/>
                <circle cx="88" cy="50" r="2" fill="#495057"/><circle cx="83.1" cy="68.1" r="2" fill="#495057"/>
                <circle cx="68.1" cy="83.1" r="2" fill="#495057"/><circle cx="50" cy="88" r="2" fill="#495057"/>
                <circle cx="31.9" cy="83.1" r="2" fill="#495057"/><circle cx="16.9" cy="68.1" r="2" fill="#495057"/>
                <circle cx="12" cy="50" r="2" fill="#495057"/><circle cx="16.9" cy="31.9" r="2" fill="#495057"/>
                <circle cx="31.9" cy="16.9" r="2" fill="#495057"/>
                <line id="hand-right" x1="50" y1="50" x2="50" y2="15" stroke="#212529" stroke-width="5" stroke-linecap="round" />
            </svg>
        </div>

        <div class="btn-grid" id="button-container"></div>
    </div>

    <div id="result-screen" class="screen">
        <h2>リザルト</h2>
        <p>10問正解のタイム:</p>
        <div class="result-time"><span id="total-time">0.00</span> 秒</div>
        <div class="result-miss">ミス回数: <span id="total-miss">0</span> 回</div>
        <button class="btn-start" onclick="startQuiz()">もう一度挑戦</button>
    </div>
</div>

<script>
    let currentStep = 0;
    let startTime = 0;
    let totalPenaltyTime = 0; 
    let effectStartTime = 0;  
    let leftTime = 0;
    let rightTime = 0;
    let correctAnswer = 0;
    let isRunning = false;
    let isTransitioning = false;
    let missCount = 0; // ミス回数の記録用

    const btnContainer = document.getElementById('button-container');
    const arrowPath = document.getElementById('arrow-path');
    const correctOverlay = document.getElementById('correct-overlay');
    const incorrectOverlay = document.getElementById('incorrect-overlay');

    const buttonLayout = [
        [0, true],
        [-1, false], [1, false],
        [-2, false], [2, false],
        [-3, false], [3, false],
        [-4, false], [4, false],
        [-5, false], [5, false],
        [6, true]
    ];

    buttonLayout.forEach(([num, isFull]) => {
        const btn = document.createElement('button');
        btn.className = 'btn-answer';
        
        if (isFull) {
            btn.classList.add('btn-fullwidth');
            btn.innerText = num;
        } else {
            if (num < 0) {
                btn.classList.add('btn-minus');
                btn.innerText = num;
            } else {
                btn.classList.add('btn-plus');
                btn.innerText = `+${num}`;
            }
        }
        
        btn.onclick = () => checkAnswer(num);
        btnContainer.appendChild(btn);
    });

    function showScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function startQuiz() {
        currentStep = 0;
        totalPenaltyTime = 0;
        missCount = 0;
        startTime = performance.now();
        isRunning = true;
        isTransitioning = false;
        nextQuestion();
        showScreen('quiz-screen');
        updateTimer();
    }

    function updateTimer() {
        if (!isRunning) return;
        
        let now = performance.now();
        let elapsed;
        
        if (isTransitioning) {
            // 【仕様通り】正解エフェクト中のみタイム表示の進行を固定
            elapsed = ((effectStartTime - startTime - totalPenaltyTime) / 1000);
        } else {
            elapsed = ((now - startTime - totalPenaltyTime) / 1000);
        }
        
        document.getElementById('live-time').innerText = elapsed.toFixed(2);
        requestAnimationFrame(updateTimer);
    }

    function nextQuestion() {
        currentStep++;
        if (currentStep > 10) {
            endQuiz();
            return;
        }
        document.getElementById('current-question').innerText = currentStep;

        leftTime = Math.floor(Math.random() * 12);
        rightTime = Math.floor(Math.random() * 12);

        const isLeftToRight = Math.random() < 0.5;

        let fromTime, toTime;
        if (isLeftToRight) {
            arrowPath.setAttribute('d', 'M22,12 L10,2 L10,8 L2,8 L2,16 L10,16 L10,22 Z');
            fromTime = leftTime;
            toTime = rightTime;
        } else {
            arrowPath.setAttribute('d', 'M2,12 L14,2 L14,8 L22,8 L22,16 L14,16 L14,22 Z');
            fromTime = rightTime;
            toTime = leftTime;
        }

        let diff = toTime - fromTime;
        while (diff <= -5) diff += 12;
        while (diff > 6) diff -= 12;
        correctAnswer = diff;

        document.getElementById('hand-left').setAttribute('transform', `rotate(${leftTime * 30} 50 50)`);
        document.getElementById('hand-right').setAttribute('transform', `rotate(${rightTime * 30} 50 50)`);
    }

    function checkAnswer(selected) {
        if (isTransitioning) return;

        if (selected === correctAnswer) {
            triggerCorrectEffect();
        } else {
            missCount++; // ミスをカウント
            triggerIncorrectEffect();
        }
    }

    // 正解時の演出（タイマー停止あり）
    function triggerCorrectEffect() {
        isTransitioning = true;
        effectStartTime = performance.now(); 
        correctOverlay.classList.add('show');

        setTimeout(() => {
            correctOverlay.classList.remove('show');
            let effectEndTime = performance.now();
            totalPenaltyTime += (effectEndTime - effectStartTime); // 演出時間を差し引く
            isTransitioning = false;
            nextQuestion();
        }, 250);
    }

    // 不正解時の演出（タイマーは停止しない）
    function triggerIncorrectEffect() {
        isTransitioning = true; // 演出中の連続タップを防止
        incorrectOverlay.classList.add('show');

        setTimeout(() => {
            incorrectOverlay.classList.remove('show');
            isTransitioning = false; // 問題は進めず、入力を再開可能にする
        }, 250);
    }

    function endQuiz() {
        isRunning = false;
        const endTime = performance.now();
        const totalTime = ((endTime - startTime - totalPenaltyTime) / 1000).toFixed(2);
        document.getElementById('total-time').innerText = totalTime;
        document.getElementById('total-miss').innerText = missCount; // 結果に反映
        showScreen('result-screen');
    }
</script>
</body>
</html>
